<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Highway Drive Prototype</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #7fc7cf; font-family: Arial, sans-serif; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; inset: 0; pointer-events: none; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.8);
      font-size: 14px;
    }
    #topLeft {
      position: absolute; left: 16px; top: 16px; background: rgba(0,0,0,.32);
      padding: 10px 12px; border-radius: 10px; line-height: 1.6;
      backdrop-filter: blur(4px);
    }
    #message {
      position: absolute; left: 50%; top: 20px; transform: translateX(-50%);
      background: rgba(0,0,0,.38); padding: 10px 16px; border-radius: 999px;
      font-weight: bold; letter-spacing: .04em;
    }
    #bottomAssist {
      position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%);
      width: min(720px, 80vw); height: 24px; border-radius: 999px; overflow: hidden;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 0 0 1px rgba(0,0,0,.12) inset;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
    }
    .assistLane {
      position: relative; border-right: 1px solid rgba(255,255,255,.1);
      background: linear-gradient(to top, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }
    .assistLane:last-child { border-right: none; }
    .fill {
      position: absolute; inset: 0; opacity: 0; transition: opacity .1s linear, filter .1s linear;
      background: linear-gradient(to top, rgba(255,96,96,.95), rgba(255,170,0,.72), rgba(255,255,255,.08));
      filter: saturate(1.1);
    }
    .label {
      position: absolute; bottom: -18px; width: 100%; text-align: center; font-size: 11px; opacity: .7;
    }
    #damageWrap {
      margin-top: 4px; width: 190px; height: 10px; border-radius: 999px; overflow: hidden;
      background: rgba(255,255,255,.16);
    }
    #damageBar { height: 100%; width: 0%; background: linear-gradient(90deg, #5dd75d, #ffc940, #ff5252); }
    #help {
      position: absolute; right: 16px; top: 16px; background: rgba(0,0,0,.30); padding: 10px 12px;
      border-radius: 10px; line-height: 1.55; max-width: 310px; backdrop-filter: blur(4px);
    }
    #endScreen {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.52); z-index: 10;
    }
    #endCard {
      background: rgba(18,24,28,.92); color: #fff; width: min(520px, 92vw);
      border-radius: 18px; padding: 24px; box-shadow: 0 20px 80px rgba(0,0,0,.45);
    }
    button {
      pointer-events: auto; border: none; background: #2f8f4e; color: white; border-radius: 10px;
      padding: 12px 16px; font-size: 15px; cursor: pointer; margin-top: 16px;
    }
    .small { opacity: .75; font-size: 12px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="message">合流車線から停止状態でスタート。安全を見て本線へ。</div>
    <div id="topLeft">
      <div>速度 <span id="speed">0</span> km/h</div>
      <div>車線 <span id="laneText">合流車線</span></div>
      <div>区間 <span id="sectionText">都市高架導入区間</span></div>
      <div>到達候補 <span id="destinationText">大阪 / 京都 / 名古屋 方面</span></div>
      <div>ダメージ <span id="damageText">0</span>/100</div>
      <div id="damageWrap"><div id="damageBar"></div></div>
    </div>
    <div id="help">
      <div><strong>PC操作</strong></div>
      <div>X / ↑ アクセル</div>
      <div>Z / ↓ ブレーキ</div>
      <div>A,D / ←,→ 左右操舵</div>
      <div>Q / E ウインカー</div>
      <div>Space ハザード</div>
      <div class="small">画面下バー: 後方左 / 後方中央 / 後方右 の交通気配</div>
    </div>
    <div id="bottomAssist">
      <div class="assistLane"><div class="fill" id="assistL"></div><div class="label">後方左</div></div>
      <div class="assistLane"><div class="fill" id="assistC"></div><div class="label">後方中央</div></div>
      <div class="assistLane"><div class="fill" id="assistR"></div><div class="label">後方右</div></div>
    </div>
  </div>
  <div id="endScreen">
    <div id="endCard">
      <h2 id="endTitle">到着</h2>
      <p id="endBody"></p>
      <button id="restartBtn">もう一度走る</button>
      <div class="small">この試作版は HTML 単体のプレイアブル試作です。実在風標識、合流スタート、ルート選択、AI 交通の基礎を先に入れています。</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';

    const app = document.getElementById('app');
    const speedEl = document.getElementById('speed');
    const laneTextEl = document.getElementById('laneText');
    const sectionTextEl = document.getElementById('sectionText');
    const destinationTextEl = document.getElementById('destinationText');
    const damageTextEl = document.getElementById('damageText');
    const damageBarEl = document.getElementById('damageBar');
    const messageEl = document.getElementById('message');
    const assistEls = {
      left: document.getElementById('assistL'),
      center: document.getElementById('assistC'),
      right: document.getElementById('assistR'),
    };
    const endScreen = document.getElementById('endScreen');
    const endTitle = document.getElementById('endTitle');
    const endBody = document.getElementById('endBody');
    document.getElementById('restartBtn').onclick = () => location.reload();

    const ROAD = {
      standardLaneWidth: 3.5,
      constrainedLaneWidth: 3.25,
      shoulderLeft: 0.75,
      shoulderRight: 0.45,
      dashLength: 8.0,
      dashGap: 12.0,
      get totalThreeLaneWidth() { return this.constrainedLaneWidth * 3 + this.shoulderLeft + this.shoulderRight; }
    };

    const VEHICLES = {
      sedan: { length: 4.6, width: 1.75, height: 1.45, speedBias: 0, leftBias: 0.55, colorChoices: [0xf4f4f4, 0x111111, 0xbebebe, 0x2b4c7e, 0x5f0d19] },
      kei: { length: 3.4, width: 1.48, height: 1.65, speedBias: -8, leftBias: 0.82, colorChoices: [0xffffff, 0x7ec8e3, 0xf8d66d, 0xf4a6c6, 0xbedf9f] },
      sport: { length: 4.4, width: 1.82, height: 1.25, speedBias: 15, leftBias: 0.15, colorChoices: [0xd22222, 0x224bcb, 0xffd54c, 0xffffff, 0x111111, 0x21a35f] },
      truck: { length: 7.5, width: 2.3, height: 3.0, speedBias: -12, leftBias: 0.92, colorChoices: [0xe8e8e8, 0x9ca3af, 0x29435c, 0x395b3f] },
      dump: { length: 6.5, width: 2.2, height: 2.8, speedBias: -14, leftBias: 0.9, colorChoices: [0xe8e8e8, 0x5f6b6d, 0x365943, 0x2d4a8f] },
      bus: { length: 10.5, width: 2.5, height: 3.2, speedBias: -10, leftBias: 0.93, colorChoices: [0xf8f7ef, 0xd7e6ff, 0xd9eed7] },
      bike: { length: 2.1, width: 0.8, height: 1.15, speedBias: 8, leftBias: 0.3, colorChoices: [0xffffff, 0x111111, 0xd22222, 0x1a66ff, 0x60bb46] },
    };

    const DESTS = [
      { key: 'osaka', label: '大阪', en: 'Osaka' },
      { key: 'kyoto', label: '京都', en: 'Kyoto' },
      { key: 'nagoya', label: '名古屋', en: 'Nagoya' },
      { key: 'hakata', label: '北九州', en: 'Kitakyushu' }
    ];

    const scene = new THREE.Scene();
    window.addEventListener('error', (ev) => {
      const msg = document.getElementById('message');
      if (msg) msg.textContent = '初期化エラーが発生しました。更新版を再読み込みしてください。';
      console.error(ev.error || ev.message);
    });

    scene.fog = new THREE.Fog(0x95d0db, 80, 900);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 2000);

    const hemi = new THREE.HemisphereLight(0xc8eef5, 0x74725f, 1.15);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 1.1);
    sun.position.set(120, 160, 40);
    sun.castShadow = true;
    scene.add(sun);

    const world = new THREE.Group();
    scene.add(world);

    function rand(min, max) { return min + Math.random() * (max - min); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function smoothstep(edge0, edge1, x) {
      x = clamp((x - edge0) / (edge1 - edge0), 0, 1);
      return x * x * (3 - 2 * x);
    }

    function laneCountAt(s) {
      if (s < 230) return 3;
      if (s < 580) return 2;
      if (s < 930) return 3;
      return 2;
    }

    function laneWidthAt(s) {
      return laneCountAt(s) >= 3 ? ROAD.constrainedLaneWidth : ROAD.standardLaneWidth;
    }

    function routeWidthAt(s) {
      const laneWidth = laneWidthAt(s);
      const laneCount = laneCountAt(s);
      return laneWidth * laneCount + ROAD.shoulderLeft + ROAD.shoulderRight;
    }

    function laneCenterOffset(index, laneCount, laneWidth) {
      const start = -((laneCount - 1) * laneWidth) / 2;
      return start + index * laneWidth;
    }

    function routePoint(s) {
      const x = 11 * Math.sin(s * 0.0045) + 4 * Math.sin(s * 0.011 + 0.8);
      const y = 0.55 * Math.sin(s * 0.014) + (s > 520 ? 0.9 * Math.sin((s - 520) * 0.022) : 0);
      const z = s;
      return new THREE.Vector3(x, y, z);
    }

    function routeTangent(s) {
      const p1 = routePoint(Math.max(0, s - 0.5));
      const p2 = routePoint(s + 0.5);
      return p2.sub(p1).normalize();
    }

    function routeFrame(s) {
      const p = routePoint(s);
      const tangent = routeTangent(s);
      const up = new THREE.Vector3(0, 1, 0);
      const right = new THREE.Vector3().crossVectors(up, tangent).normalize();
      return { p, tangent, right, up };
    }

    function skyForProgress(t) {
      const morningTop = new THREE.Color(0x84d8ef);
      const noonTop = new THREE.Color(0x8fc8ff);
      const duskTop = new THREE.Color(0xf1a16e);
      const morningFog = new THREE.Color(0xaedbe5);
      const noonFog = new THREE.Color(0x95d0db);
      const duskFog = new THREE.Color(0xc38f78);
      const top = t < 0.55 ? morningTop.clone().lerp(noonTop, t / 0.55) : noonTop.clone().lerp(duskTop, (t - 0.55) / 0.45);
      const fog = t < 0.55 ? morningFog.clone().lerp(noonFog, t / 0.55) : noonFog.clone().lerp(duskFog, (t - 0.55) / 0.45);
      return { top, fog };
    }

    function createRoadSegmentMesh(length = 1400) {
      const geom = new THREE.BufferGeometry();
      const positions = [];
      const colors = [];
      const indices = [];
      const laneMarkers = [];
      const markerColors = [];
      const markerIndices = [];
      const shoulderGeom = new THREE.BufferGeometry();
      const shoulderPos = [];
      const shoulderCol = [];
      const shoulderIdx = [];
      let idx = 0, markerIdx = 0, shoulderIdxCursor = 0;

      for (let s = 0; s < length; s += 2) {
        const frame = routeFrame(s);
        const next = routeFrame(s + 2);
        const width = routeWidthAt(s);
        const half = width / 2;

        const l1 = frame.p.clone().add(frame.right.clone().multiplyScalar(-half));
        const r1 = frame.p.clone().add(frame.right.clone().multiplyScalar(half));
        const l2 = next.p.clone().add(next.right.clone().multiplyScalar(-routeWidthAt(s + 2) / 2));
        const r2 = next.p.clone().add(next.right.clone().multiplyScalar(routeWidthAt(s + 2) / 2));
        [l1, r1, l2, r2].forEach(v => positions.push(v.x, v.y, v.z));
        const c = new THREE.Color(0x313131);
        for (let i = 0; i < 4; i++) colors.push(c.r, c.g, c.b);
        indices.push(idx, idx + 2, idx + 1, idx + 1, idx + 2, idx + 3);
        idx += 4;

        const laneCount = laneCountAt(s);
        for (let lane = 0; lane < laneCount + 1; lane++) {
          if (lane === 0 || lane === laneCount) continue;
          const off1 = laneCenterOffset(lane - 1, laneCount, laneWidthAt(s)) + laneWidthAt(s) / 2;
          const off2 = laneCenterOffset(lane - 1, laneCount, laneWidthAt(s + 2)) + laneWidthAt(s + 2) / 2;
          const center1 = frame.p.clone().add(frame.right.clone().multiplyScalar(off1));
          const center2 = next.p.clone().add(next.right.clone().multiplyScalar(off2));
          const dashWidth = 0.12;
          const dashLength = 1.0;
          const draw = (s % (ROAD.dashLength + ROAD.dashGap)) < ROAD.dashLength;
          if (!draw) continue;
          const a = center1.clone().add(frame.right.clone().multiplyScalar(-dashWidth / 2));
          const b = center1.clone().add(frame.right.clone().multiplyScalar(dashWidth / 2));
          const c1 = center2.clone().add(next.right.clone().multiplyScalar(-dashWidth / 2));
          const d = center2.clone().add(next.right.clone().multiplyScalar(dashWidth / 2));
          [a, b, c1, d].forEach(v => laneMarkers.push(v.x, v.y + 0.02, v.z));
          const mc = new THREE.Color(0xf7f7f7);
          for (let i = 0; i < 4; i++) markerColors.push(mc.r, mc.g, mc.b);
          markerIndices.push(markerIdx, markerIdx + 2, markerIdx + 1, markerIdx + 1, markerIdx + 2, markerIdx + 3);
          markerIdx += 4;
        }

        const leftShoulder1 = frame.p.clone().add(frame.right.clone().multiplyScalar(-half - 0.8));
        const leftShoulder2 = next.p.clone().add(next.right.clone().multiplyScalar(-routeWidthAt(s + 2) / 2 - 0.8));
        const leftEdge1 = frame.p.clone().add(frame.right.clone().multiplyScalar(-half));
        const leftEdge2 = next.p.clone().add(next.right.clone().multiplyScalar(-routeWidthAt(s + 2) / 2));
        [leftShoulder1, leftEdge1, leftShoulder2, leftEdge2].forEach(v => shoulderPos.push(v.x, v.y - 0.01, v.z));
        const shoulderColor = new THREE.Color(0x6a604d);
        for (let i = 0; i < 4; i++) shoulderCol.push(shoulderColor.r, shoulderColor.g, shoulderColor.b);
        shoulderIdx.push(shoulderIdxCursor, shoulderIdxCursor + 2, shoulderIdxCursor + 1, shoulderIdxCursor + 1, shoulderIdxCursor + 2, shoulderIdxCursor + 3);
        shoulderIdxCursor += 4;

        const rightEdge1 = frame.p.clone().add(frame.right.clone().multiplyScalar(half));
        const rightEdge2 = next.p.clone().add(next.right.clone().multiplyScalar(routeWidthAt(s + 2) / 2));
        const rightShoulder1 = frame.p.clone().add(frame.right.clone().multiplyScalar(half + 0.8));
        const rightShoulder2 = next.p.clone().add(next.right.clone().multiplyScalar(routeWidthAt(s + 2) / 2 + 0.8));
        [rightEdge1, rightShoulder1, rightEdge2, rightShoulder2].forEach(v => shoulderPos.push(v.x, v.y - 0.01, v.z));
        for (let i = 0; i < 4; i++) shoulderCol.push(shoulderColor.r, shoulderColor.g, shoulderColor.b);
        shoulderIdx.push(shoulderIdxCursor, shoulderIdxCursor + 2, shoulderIdxCursor + 1, shoulderIdxCursor + 1, shoulderIdxCursor + 2, shoulderIdxCursor + 3);
        shoulderIdxCursor += 4;
      }

      geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geom.setIndex(indices);
      geom.computeVertexNormals();
      const road = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.95, metalness: 0.03 }));
      road.receiveShadow = true;

      const markerGeom = new THREE.BufferGeometry();
      markerGeom.setAttribute('position', new THREE.Float32BufferAttribute(laneMarkers, 3));
      markerGeom.setAttribute('color', new THREE.Float32BufferAttribute(markerColors, 3));
      markerGeom.setIndex(markerIndices);
      const markers = new THREE.Mesh(markerGeom, new THREE.MeshStandardMaterial({ vertexColors: true }));

      shoulderGeom.setAttribute('position', new THREE.Float32BufferAttribute(shoulderPos, 3));
      shoulderGeom.setAttribute('color', new THREE.Float32BufferAttribute(shoulderCol, 3));
      shoulderGeom.setIndex(shoulderIdx);
      shoulderGeom.computeVertexNormals();
      const shoulder = new THREE.Mesh(shoulderGeom, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1 }));
      shoulder.receiveShadow = true;

      const group = new THREE.Group();
      group.add(road, markers, shoulder);
      return group;
    }

    function createGuardrails(length = 1400) {
      const group = new THREE.Group();
      const railMat = new THREE.MeshStandardMaterial({ color: 0x9ca3af, roughness: 0.55, metalness: 0.4 });
      const postMat = new THREE.MeshStandardMaterial({ color: 0x6b7280, roughness: 0.7 });
      for (let s = 0; s < length; s += 7) {
        const frame = routeFrame(s);
        const width = routeWidthAt(s);
        const half = width / 2;
        [-1, 1].forEach(side => {
          const base = frame.p.clone().add(frame.right.clone().multiplyScalar(side * (half + 0.55)));
          const post = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.7, 0.08), postMat);
          post.position.copy(base).add(new THREE.Vector3(0, 0.35, 0));
          post.castShadow = true;
          const rail = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 3.2), railMat);
          rail.position.copy(base).add(new THREE.Vector3(0, 0.7, 0));
          rail.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), frame.tangent.clone());
          rail.castShadow = true;
          group.add(post, rail);
        });
      }
      return group;
    }

    function createSimpleTree(color = 0x4d7c3f) {
      const g = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 2.2, 6), new THREE.MeshStandardMaterial({ color: 0x6b4f2c }));
      const crown = new THREE.Mesh(new THREE.SphereGeometry(1.15, 8, 8), new THREE.MeshStandardMaterial({ color, roughness: 1 }));
      trunk.position.y = 1.1;
      crown.position.y = 2.7;
      g.add(trunk, crown);
      return g;
    }

    function createBackground() {
      const bg = new THREE.Group();
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(2600, 2600), new THREE.MeshStandardMaterial({ color: 0x7fa074, roughness: 1 }));
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.05;
      ground.receiveShadow = true;
      bg.add(ground);

      for (let i = 0; i < 180; i++) {
        const s = i * 8;
        const frame = routeFrame(s);
        const width = routeWidthAt(s);
        const side = i % 2 === 0 ? -1 : 1;
        const dist = rand(20, 52);
        const tree = createSimpleTree(i % 5 === 0 ? 0x6f8d46 : 0x5f7d3c);
        tree.position.copy(frame.p).add(frame.right.clone().multiplyScalar(side * (width / 2 + dist)));
        tree.position.y = -0.02;
        bg.add(tree);
      }

      for (let i = 0; i < 28; i++) {
        const s = i * 45 + 30;
        const frame = routeFrame(s);
        const side = i % 2 === 0 ? -1 : 1;
        const b = new THREE.Mesh(new THREE.BoxGeometry(rand(8, 20), rand(12, 34), rand(8, 20)), new THREE.MeshStandardMaterial({ color: side < 0 ? 0x98a3b3 : 0xb7c0d4 }));
        b.position.copy(frame.p).add(frame.right.clone().multiplyScalar(side * rand(42, 72)));
        b.position.y = b.geometry.parameters.height / 2;
        b.castShadow = true;
        bg.add(b);
      }
      return bg;
    }

    function makeLightGeom(length=0.22, height=0.12, depth=0.08, color=0x441111) {
      return new THREE.Mesh(new THREE.BoxGeometry(length, height, depth), new THREE.MeshStandardMaterial({ color, emissive: 0x000000 }));
    }

    function createVehicleMesh(type, bodyColor) {
      const spec = VEHICLES[type];
      const g = new THREE.Group();
      const mats = {
        body: new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.78, metalness: 0.06 }),
        dark: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95 }),
        glass: new THREE.MeshStandardMaterial({ color: 0xcfd8dc, roughness: 0.2 }),
        wheel: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1 }),
        rearOff: new THREE.MeshStandardMaterial({ color: 0x3b1111, emissive: 0x000000 }),
        frontOff: new THREE.MeshStandardMaterial({ color: 0x5f5d50, emissive: 0x000000 }),
        turnOff: new THREE.MeshStandardMaterial({ color: 0x5a4120, emissive: 0x000000 }),
      };

      const lights = { brake: [], leftTurn: [], rightTurn: [], hazard: [] };
      function add(mesh, x=0, y=0, z=0) { mesh.position.set(x,y,z); mesh.castShadow = true; mesh.receiveShadow = true; g.add(mesh); return mesh; }

      if (type === 'sedan') {
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width, 0.62, spec.length * 0.42), mats.body), 0, 0.46, 0.3);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.92, 0.42, spec.length * 0.28), mats.body), 0, 0.9, 0.75);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.9, 0.34, spec.length * 0.22), mats.glass), 0, 1.05, -0.05);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.88, 0.3, spec.length * 0.2), mats.body), 0, 0.86, -0.8);
      } else if (type === 'kei') {
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width, 0.75, spec.length * 0.5), mats.body), 0, 0.48, 0.1);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.94, 0.62, spec.length * 0.34), mats.body), 0, 1.06, 0.35);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.86, 0.46, spec.length * 0.18), mats.glass), 0, 1.08, -0.38);
      } else if (type === 'sport') {
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width, 0.42, spec.length * 0.5), mats.body), 0, 0.34, 0.2);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.92, 0.28, spec.length * 0.24), mats.body), 0, 0.6, 0.55);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.85, 0.22, spec.length * 0.22), mats.glass), 0, 0.62, -0.05);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.82, 0.18, spec.length * 0.18), mats.body), 0, 0.52, -0.65);
      } else if (type === 'truck') {
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width, 0.85, spec.length * 0.2), mats.body), 0, 0.68, -spec.length * 0.28);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.9, 0.7, spec.length * 0.14), mats.glass), 0, 1.18, -spec.length * 0.33);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.94, 1.1, spec.length * 0.54), mats.dark), 0, 0.9, spec.length * 0.13);
      } else if (type === 'dump') {
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width, 0.8, spec.length * 0.22), mats.body), 0, 0.66, -spec.length * 0.24);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.9, 0.68, spec.length * 0.14), mats.glass), 0, 1.16, -spec.length * 0.28);
        const dumpBed = new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.94, 1.0, spec.length * 0.48), mats.dark);
        dumpBed.rotation.x = -0.08;
        add(dumpBed, 0, 0.9, spec.length * 0.12);
      } else if (type === 'bus') {
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width, 1.55, spec.length * 0.82), mats.body), 0, 1.02, 0);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.92, 0.52, spec.length * 0.18), mats.glass), 0, 1.38, -spec.length * 0.32);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.9, 0.5, spec.length * 0.58), mats.dark), 0, 1.28, 0.08);
      } else if (type === 'bike') {
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.35, 0.34, spec.length * 0.52), mats.body), 0, 0.52, 0.1);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.22, 0.24, spec.length * 0.18), mats.body), 0, 0.74, -0.36);
        add(new THREE.Mesh(new THREE.BoxGeometry(spec.width * 0.28, 0.18, spec.length * 0.2), mats.body), 0, 0.66, 0.45);
      }

      const wheelRadius = type === 'bus' ? 0.52 : type === 'truck' || type === 'dump' ? 0.48 : type === 'sport' ? 0.42 : type === 'bike' ? 0.34 : 0.4;
      const wheelDepth = type === 'bike' ? 0.16 : 0.28;
      const wheelGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, wheelDepth, 16);
      wheelGeo.rotateZ(Math.PI / 2);

      if (type === 'bike') {
        const front = add(new THREE.Mesh(wheelGeo, mats.wheel), 0, wheelRadius, -spec.length * 0.42);
        const rear = add(new THREE.Mesh(wheelGeo, mats.wheel), 0, wheelRadius, spec.length * 0.42);
      } else {
        const x = spec.width * 0.46;
        const fz = -spec.length * 0.34;
        const rz = spec.length * 0.3;
        add(new THREE.Mesh(wheelGeo, mats.wheel), -x, wheelRadius, fz);
        add(new THREE.Mesh(wheelGeo, mats.wheel), x, wheelRadius, fz);
        add(new THREE.Mesh(wheelGeo, mats.wheel), -x, wheelRadius, rz);
        add(new THREE.Mesh(wheelGeo, mats.wheel), x, wheelRadius, rz);
      }

      function addRearLights(z) {
        const leftBrake = add(makeLightGeom(0.18, 0.10, 0.08, 0x3b1111), -spec.width * 0.34, 0.52, z);
        const rightBrake = add(makeLightGeom(0.18, 0.10, 0.08, 0x3b1111), spec.width * 0.34, 0.52, z);
        lights.brake.push(leftBrake, rightBrake);
        const leftTurn = add(makeLightGeom(0.1, 0.1, 0.08, 0x5a4120), -spec.width * 0.44, 0.52, z);
        const rightTurn = add(makeLightGeom(0.1, 0.1, 0.08, 0x5a4120), spec.width * 0.44, 0.52, z);
        lights.leftTurn.push(leftTurn);
        lights.rightTurn.push(rightTurn);
      }

      function addFrontLights(z) {
        add(makeLightGeom(0.18, 0.10, 0.08, 0x5f5d50), -spec.width * 0.34, 0.44, z);
        add(makeLightGeom(0.18, 0.10, 0.08, 0x5f5d50), spec.width * 0.34, 0.44, z);
      }

      addRearLights(spec.length * 0.5 - 0.05);
      addFrontLights(-spec.length * 0.5 + 0.05);

      g.userData.lights = lights;
      return g;
    }

    function setVehicleLights(vehicle, state) {
      const lights = vehicle.mesh.userData.lights;
      const brakeColor = state.brake ? 0xff2222 : 0x3b1111;
      const brakeEmissive = state.brake ? 0x660000 : 0x000000;
      lights.brake.forEach(l => { l.material.color.setHex(brakeColor); l.material.emissive.setHex(brakeEmissive); });
      const leftOn = state.hazard || (state.turn === 'left' && state.blinkVisible);
      const rightOn = state.hazard || (state.turn === 'right' && state.blinkVisible);
      lights.leftTurn.forEach(l => { l.material.color.setHex(leftOn ? 0xff9c1a : 0x5a4120); l.material.emissive.setHex(leftOn ? 0x663300 : 0x000000); });
      lights.rightTurn.forEach(l => { l.material.color.setHex(rightOn ? 0xff9c1a : 0x5a4120); l.material.emissive.setHex(rightOn ? 0x663300 : 0x000000); });
    }

    function makeDestinationSign(mainText, subText, arrow='straight') {
      const canvas = document.createElement('canvas');
      canvas.width = 1024; canvas.height = 320;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#117643';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#f6fff8';
      ctx.lineWidth = 12;
      ctx.strokeRect(12, 12, canvas.width - 24, canvas.height - 24);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 64px sans-serif';
      ctx.fillText(mainText, 70, 125);
      ctx.font = '42px sans-serif';
      ctx.fillText(subText, 72, 215);
      ctx.lineWidth = 20;
      ctx.lineCap = 'round';
      ctx.beginPath();
      if (arrow === 'left') {
        ctx.moveTo(860, 240); ctx.lineTo(740, 160); ctx.lineTo(820, 160);
        ctx.moveTo(740, 160); ctx.lineTo(740, 90);
      } else if (arrow === 'right') {
        ctx.moveTo(740, 240); ctx.lineTo(860, 160); ctx.lineTo(780, 160);
        ctx.moveTo(860, 160); ctx.lineTo(860, 90);
      } else {
        ctx.moveTo(800, 240); ctx.lineTo(800, 90); ctx.lineTo(760, 130);
        ctx.moveTo(800, 90); ctx.lineTo(840, 130);
      }
      ctx.strokeStyle = '#ffffff';
      ctx.stroke();
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.9 });
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(10.5, 3.3), mat);
      return plane;
    }

    function createSigns() {
      const group = new THREE.Group();
      const signDefs = [
        { s: 130, main: '新名神 / 京都 / 大阪', sub: 'Shin-Meishin / Kyoto / Osaka', arrow: 'straight' },
        { s: 310, main: '伊勢湾岸道 / 名古屋 / 伊勢', sub: 'Isewangan / Nagoya / Ise', arrow: 'left' },
        { s: 540, main: '中央道 西方面 / 豊田', sub: 'Chuo Expwy West / Toyota', arrow: 'straight' },
        { s: 760, main: '北九州方面 / 海沿いルート', sub: 'Kitakyushu / Bayside', arrow: 'right' },
        { s: 1030, main: '出口 北九州 / 工業地帯', sub: 'Exit Kitakyushu / Industrial', arrow: 'right' },
      ];
      signDefs.forEach(def => {
        const frame = routeFrame(def.s);
        const width = routeWidthAt(def.s);
        const pole = new THREE.Mesh(new THREE.BoxGeometry(0.28, 7, 0.28), new THREE.MeshStandardMaterial({ color: 0x8a939e, metalness: 0.4, roughness: 0.6 }));
        pole.position.copy(frame.p).add(frame.right.clone().multiplyScalar(width / 2 + 0.6));
        pole.position.y += 3.5;
        const beam = new THREE.Mesh(new THREE.BoxGeometry(width * 0.9, 0.22, 0.24), new THREE.MeshStandardMaterial({ color: 0xaeb8c2, metalness: 0.35, roughness: 0.55 }));
        beam.position.copy(frame.p).add(new THREE.Vector3(0, 6.9, 0));
        beam.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), frame.right.clone().negate());
        const sign = makeDestinationSign(def.main, def.sub, def.arrow);
        sign.position.copy(frame.p).add(new THREE.Vector3(0, 5.25, 0));
        sign.lookAt(frame.p.clone().sub(frame.tangent.clone().multiplyScalar(30)).add(new THREE.Vector3(0, 4, 0)));
        group.add(pole, beam, sign);
      });
      return group;
    }

    const roadGroup = createRoadSegmentMesh();
    const rails = createGuardrails();
    const bg = createBackground();
    const signs = createSigns();
    world.add(bg, roadGroup, rails, signs);

    const sea = new THREE.Mesh(new THREE.PlaneGeometry(1800, 1800), new THREE.MeshStandardMaterial({ color: 0x6db9d9, transparent: true, opacity: 0.88, roughness: 0.2 }));
    sea.rotation.x = -Math.PI / 2;
    sea.position.set(220, -0.2, 800);
    scene.add(sea);

    const player = {
      type: 'sedan',
      width: VEHICLES.sedan.width,
      length: VEHICLES.sedan.length,
      speed: 0,
      damage: 0,
      s: 10,
      laneMode: 'merge',
      laneIndex: 0,
      laneOffset: -laneWidthAt(0) * 1.6,
      steering: 0,
      steerTarget: 0,
      turn: 'off',
      hazard: false,
      blinkTimer: 0,
      blinkVisible: false,
      lastBrake: false,
      mesh: createVehicleMesh('sedan', 0x111111),
      goal: null,
      merged: false,
      allowInput: true,
      laneChangeLock: 0,
    };
    scene.add(player.mesh);

    const aiVehicles = [];
    let blinkGlobal = 0;

    function vehicleTargetLaneOffset(vehicle) {
      if (vehicle.isPlayer) {
        if (vehicle.laneMode === 'merge') {
          const t = smoothstep(20, 92, vehicle.s);
          return lerp(-laneWidthAt(vehicle.s) * 1.6, laneCenterOffset(0, 3, laneWidthAt(vehicle.s)), t);
        }
        const count = laneCountAt(vehicle.s);
        return laneCenterOffset(clamp(vehicle.laneIndex, 0, count - 1), count, laneWidthAt(vehicle.s));
      }
      const count = laneCountAt(vehicle.s);
      return laneCenterOffset(clamp(vehicle.laneIndex, 0, count - 1), count, laneWidthAt(vehicle.s));
    }

    function positionVehicle(vehicle) {
      const frame = routeFrame(vehicle.s);
      const targetOffset = vehicleTargetLaneOffset(vehicle);
      vehicle.laneOffset = lerp(vehicle.laneOffset, targetOffset, vehicle.isPlayer ? 0.03 : 0.02);
      const pos = frame.p.clone().add(frame.right.clone().multiplyScalar(vehicle.laneOffset));
      pos.y += vehicle.isPlayer ? 0.08 : 0.02;
      vehicle.mesh.position.copy(pos);
      const look = frame.p.clone().add(frame.tangent);
      vehicle.mesh.lookAt(look.add(frame.right.clone().multiplyScalar(vehicle.laneOffset)));
      if (vehicle.isPlayer) {
        vehicle.mesh.rotation.z = -vehicle.steering * 0.08;
      }
    }

    function spawnAI(s, laneIndex, type) {
      const spec = VEHICLES[type];
      const color = pick(spec.colorChoices);
      const v = {
        isPlayer: false,
        type,
        width: spec.width,
        length: spec.length,
        s,
        laneIndex,
        laneOffset: laneCenterOffset(laneIndex, laneCountAt(s), laneWidthAt(s)),
        speedLimitFollow: rand(0, 1),
        aggression: rand(0.15, type === 'sport' ? 0.95 : type === 'dump' ? 0.7 : 0.68),
        perception: rand(0.25, 1),
        skill: rand(0.3, 1),
        brake: false,
        turn: 'off',
        hazard: false,
        thankHazardTimer: 0,
        blinkVisible: false,
        laneChangeCooldown: rand(1.2, 3.8),
        speed: 0,
        baseTarget: 0,
        desiredHeadway: 18,
        destination: pick(DESTS),
        wantsExit: Math.random() < 0.22,
        wantsFastLane: false,
        bullying: false,
        mesh: createVehicleMesh(type, color),
      };
      const limit = speedLimitAt(s);
      const offset = (type === 'sport' && Math.random() < 0.12) ? rand(30, 58) : rand(-3, 16 + spec.speedBias);
      v.baseTarget = clamp(limit + offset, 72, 182);
      v.speed = v.baseTarget * 0.65;
      v.desiredHeadway = lerp(28, 12, v.aggression) + lerp(4, -3, v.skill);
      scene.add(v.mesh);
      aiVehicles.push(v);
      positionVehicle(v);
      return v;
    }

    function speedLimitAt(s) {
      if (s < 220) return 80;
      if (s < 620) return 100;
      if (s < 980) return 120;
      return 80;
    }

    function initTraffic() {
      const types = ['sedan', 'kei', 'sport', 'truck', 'dump', 'bus', 'bike'];
      const used = [];
      for (let i = 0; i < 28; i++) {
        let s = rand(120, 1250);
        let guard = 0;
        while ((Math.abs(s - player.s) < 60 || used.some(u => Math.abs(u - s) < 18)) && guard < 40) {
          s = rand(120, 1250);
          guard++;
        }
        used.push(s);
        const count = laneCountAt(s);
        const lane = Math.floor(rand(0, count));
        const t = pick(types);
        spawnAI(s, lane, t);
      }
    }
    initTraffic();

    const keys = new Set();
    addEventListener('keydown', (e) => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyX','KeyA','KeyZ','KeyD','KeyQ','KeyE'].includes(e.code)) e.preventDefault();
      keys.add(e.code);
      if (e.code === 'KeyQ') player.turn = player.turn === 'left' ? 'off' : 'left';
      if (e.code === 'KeyE') player.turn = player.turn === 'right' ? 'off' : 'right';
      if (e.code === 'Space') player.hazard = !player.hazard;
    });
    addEventListener('keyup', (e) => keys.delete(e.code));

    function findFrontVehicle(target, laneIndex = target.laneIndex, maxDist = 120) {
      let best = null, bestDist = Infinity;
      aiVehicles.forEach(v => {
        if (v === target) return;
        if (laneCountAt(v.s) !== laneCountAt(target.s)) return;
        if (v.laneIndex !== laneIndex) return;
        const d = v.s - target.s;
        if (d > 0 && d < bestDist && d < maxDist) { bestDist = d; best = v; }
      });
      if (target !== player && player.laneMode !== 'merge' && target.laneIndex === player.laneIndex && laneCountAt(player.s) === laneCountAt(target.s)) {
        const d = player.s - target.s;
        if (d > 0 && d < bestDist && d < maxDist) { bestDist = d; best = player; }
      }
      return { vehicle: best, distance: bestDist };
    }

    function findRearVehicle(target, laneIndex = target.laneIndex, maxDist = 90) {
      let best = null, bestDist = Infinity;
      aiVehicles.forEach(v => {
        if (v === target) return;
        if (laneCountAt(v.s) !== laneCountAt(target.s)) return;
        if (v.laneIndex !== laneIndex) return;
        const d = target.s - v.s;
        if (d > 0 && d < bestDist && d < maxDist) { bestDist = d; best = v; }
      });
      if (target !== player && player.laneMode !== 'merge' && target.laneIndex === player.laneIndex && laneCountAt(player.s) === laneCountAt(target.s)) {
        const d = target.s - player.s;
        if (d > 0 && d < bestDist && d < maxDist) { bestDist = d; best = player; }
      }
      return { vehicle: best, distance: bestDist };
    }

    function laneSafeFor(vehicle, laneIndex) {
      if (laneIndex < 0 || laneIndex >= laneCountAt(vehicle.s)) return false;
      const front = findFrontVehicle(vehicle, laneIndex, 45);
      const rear = findRearVehicle(vehicle, laneIndex, 35);
      return (!front.vehicle || front.distance > vehicle.length + 12) && (!rear.vehicle || rear.distance > 12);
    }

    function updatePlayer(dt) {
      if (!player.allowInput) return;
      const accel = keys.has('KeyX') || keys.has('ArrowUp');
      const brake = keys.has('KeyZ') || keys.has('ArrowDown');
      const left = keys.has('KeyA') || keys.has('ArrowLeft');
      const right = keys.has('KeyD') || keys.has('ArrowRight');
      const speedLimit = speedLimitAt(player.s);
      const maxSpeed = 210;
      if (accel) player.speed += 32 * dt;
      else if (!brake) player.speed += (Math.max(speedLimit - 8, player.speed) - player.speed) * 0.12 * dt * 60;
      if (brake) player.speed -= 46 * dt;
      player.speed -= 0.65 * dt;
      player.speed = clamp(player.speed, 0, maxSpeed);

      player.steerTarget = 0;
      if (left) player.steerTarget -= 1;
      if (right) player.steerTarget += 1;
      const steerRate = player.speed > 100 ? 3.6 : 5.2;
      player.steering = lerp(player.steering, player.steerTarget, dt * steerRate);
      const laneCount = laneCountAt(player.s);

      if (player.laneChangeLock === undefined) player.laneChangeLock = 0;
      player.laneChangeLock = Math.max(0, player.laneChangeLock - dt);
      if (player.laneMode !== 'merge' && player.laneChangeLock <= 0) {
        if (player.steering < -0.7) {
          player.laneIndex = clamp(player.laneIndex - 1, 0, laneCount - 1);
          player.laneChangeLock = 0.75;
        }
        if (player.steering > 0.7) {
          player.laneIndex = clamp(player.laneIndex + 1, 0, laneCount - 1);
          player.laneChangeLock = 0.75;
        }
      }
      player.steering *= 0.92;
      const travel = player.speed / 3.6;
      player.s += travel * dt;

      if (!player.merged && player.s > 74) {
        player.merged = true;
        player.laneMode = 'main';
        player.laneIndex = 0;
        messageEl.textContent = '本線へ合流完了。標識を見てルートを選択してください。';
      }

      if (player.s > 720 && player.goal === null) {
        messageEl.textContent = '分岐が近いです。左へ寄ると名古屋方面、右へ寄ると北九州方面。';
        if (player.laneIndex <= 0) player.goal = DESTS.find(d => d.key === 'nagoya');
        else if (player.laneIndex >= 2) player.goal = DESTS.find(d => d.key === 'hakata');
      }

      if (player.s > 995) {
        if (player.goal?.key === 'hakata' && player.laneIndex >= 1) {
          finishRun('出口到達', `出口を離脱し、<strong>${player.goal.label}</strong> に到着しました。看板どおりのルート選択です。`);
        } else if (player.goal?.key === 'nagoya' && player.laneIndex <= 0) {
          finishRun('出口到達', `出口を離脱し、<strong>${player.goal.label}</strong> に到着しました。左ルートの到達判定です。`);
        }
      }

      const front = findFrontVehicle(player, player.laneIndex, 36);
      if (player.laneMode !== 'merge' && front.vehicle) {
        const closing = player.speed - front.vehicle.speed;
        if (front.distance < 10 + Math.max(0, closing * 0.1)) {
          player.speed = Math.max(0, player.speed - 52 * dt);
          addDamage(0.25 * dt * (12 + Math.max(closing, 0)));
        }
      }

      player.blinkTimer += dt;
      if (player.blinkTimer > 0.42) {
        player.blinkTimer = 0;
        player.blinkVisible = !player.blinkVisible;
      }
      const brakeState = brake || player.speed < (speedEl.value || 0);
      setVehicleLights(player, { brake: brake, turn: player.turn, hazard: player.hazard, blinkVisible: player.blinkVisible });
    }

    function addDamage(amount) {
      player.damage = clamp(player.damage + amount, 0, 100);
      if (player.damage >= 100) {
        finishRun('走行不能', 'ダメージ度が 100 に達し、車両が停止しました。軽微ペナルティ制の上限です。');
      }
    }

    function finishRun(title, body) {
      if (!player.allowInput) return;
      player.allowInput = false;
      endTitle.innerHTML = title;
      endBody.innerHTML = body + `<br><br>最終速度: ${Math.round(player.speed)} km/h<br>ダメージ: ${Math.round(player.damage)} / 100`;
      endScreen.style.display = 'flex';
      messageEl.textContent = title;
    }

    function updateAI(dt) {
      const playerLaneCount = laneCountAt(player.s);
      aiVehicles.forEach(v => {
        v.laneChangeCooldown -= dt;
        const limit = speedLimitAt(v.s);
        const front = findFrontVehicle(v, v.laneIndex, 130);
        const rear = findRearVehicle(v, v.laneIndex, 60);
        let desired = clamp(v.baseTarget, 55, Math.min(180, limit + (v.type === 'sport' ? 25 : 16)));

        if (front.vehicle) {
          const closing = v.speed - front.vehicle.speed;
          const threshold = v.desiredHeadway + Math.max(0, closing * 0.5);
          if (front.distance < threshold) desired = Math.min(desired, (front.vehicle.speed || 0) - rand(0, 4));
          if (front.distance < threshold * 0.8 && v.laneChangeCooldown <= 0) {
            const count = laneCountAt(v.s);
            const preferFast = Math.random() < (0.24 + v.aggression * 0.45);
            const leftCandidate = v.laneIndex - 1;
            const rightCandidate = v.laneIndex + 1;
            let moved = false;
            if (count > 1) {
              if (preferFast && rightCandidate < count && laneSafeFor(v, rightCandidate)) {
                v.laneIndex = rightCandidate;
                v.turn = 'right';
                v.laneChangeCooldown = rand(2.5, 5.5);
                moved = true;
              } else if (leftCandidate >= 0 && laneSafeFor(v, leftCandidate) && Math.random() < 0.65) {
                v.laneIndex = leftCandidate;
                v.turn = 'left';
                v.laneChangeCooldown = rand(2.5, 5.5);
                moved = true;
              }
            }
            if (!moved) desired = Math.min(desired, front.vehicle.speed - 4);
          }
        } else {
          const leftBias = VEHICLES[v.type].leftBias;
          if (v.laneChangeCooldown <= 0 && v.laneIndex > 0 && Math.random() < leftBias * dt * 0.8 && laneSafeFor(v, v.laneIndex - 1)) {
            v.laneIndex -= 1;
            v.turn = 'left';
            v.laneChangeCooldown = rand(2.3, 5.0);
          }
        }

        const playerBehindFast = !player.hazard && !player.allowInput ? false : (player.s < v.s ? null : null);
        const playerRearGap = v.s - player.s;
        if (player.laneMode !== 'merge' && player.laneIndex === v.laneIndex && playerRearGap < 0 && Math.abs(playerRearGap) < 45) {
          const gap = player.s - v.s;
          if (gap > 0 && gap < 30 && (player.speed - v.speed) > 20 && v.laneIndex > 0 && v.perception > 0.55) {
            if (laneSafeFor(v, v.laneIndex - 1)) {
              v.laneIndex -= 1;
              v.turn = 'left';
              v.laneChangeCooldown = rand(2.0, 4.2);
            }
          }
        }

        // Exit intentions.
        if (v.wantsExit && v.s > 900 && v.laneIndex > 0 && v.laneChangeCooldown <= 0 && laneSafeFor(v, v.laneIndex - 1)) {
          v.laneIndex -= 1;
          v.turn = 'left';
          v.laneChangeCooldown = rand(1.8, 3.5);
        }
        if (v.wantsExit && v.s > 1020 && v.laneIndex === 0) {
          v.s += 20 * dt;
          v.laneOffset -= 0.8 * dt;
          if (v.s > 1080) v.remove = true;
        }

        const accelRate = lerp(2.0, 4.6, v.skill);
        const brakeRate = lerp(3.2, 6.0, v.perception);
        if (v.speed < desired) v.speed += accelRate * dt * 8;
        else v.speed -= brakeRate * dt * 8;
        v.speed = clamp(v.speed, 35, 190);
        v.brake = desired < v.speed - 2.5;

        // Simulate bullying: fast sports cars behind player in fast lane.
        v.bullying = false;
        if (v.type === 'sport' && v.aggression > 0.72 && player.laneMode !== 'merge') {
          if (v.s < player.s && (player.s - v.s) < 60 && player.laneIndex === v.laneIndex && v.speed > player.speed + 18 && v.laneIndex >= 1) {
            v.turn = 'right';
            v.bullying = true;
          }
        }

        if (v.turn !== 'off' && v.laneChangeCooldown < 1.2) v.turn = 'off';
        if (v.thankHazardTimer > 0) {
          v.thankHazardTimer -= dt;
          v.hazard = true;
        } else {
          v.hazard = false;
        }

        v.s += (v.speed / 3.6) * dt;
        v.blinkVisible = Math.floor(performance.now() / 420) % 2 === 0;
        setVehicleLights(v, { brake: v.brake, turn: v.turn, hazard: v.hazard, blinkVisible: v.blinkVisible });
        positionVehicle(v);

        if (Math.abs(v.s - player.s) > 380 || v.remove) {
          scene.remove(v.mesh);
          v.dead = true;
        }
      });
      for (let i = aiVehicles.length - 1; i >= 0; i--) if (aiVehicles[i].dead) aiVehicles.splice(i, 1);

      // Keep density random.
      const desiredCount = 24 + Math.floor(8 * (0.5 + 0.5 * Math.sin(performance.now() * 0.00007)));
      while (aiVehicles.length < desiredCount) {
        const ahead = Math.random() < 0.68;
        const baseS = player.s + (ahead ? rand(60, 300) : -rand(60, 220));
        const clampedS = clamp(baseS, 40, 1280);
        const count = laneCountAt(clampedS);
        const lane = Math.floor(rand(0, count));
        const roll = Math.random();
        const type = roll < 0.3 ? 'sedan' : roll < 0.48 ? 'kei' : roll < 0.58 ? 'sport' : roll < 0.74 ? 'truck' : roll < 0.82 ? 'dump' : roll < 0.9 ? 'bus' : 'bike';
        spawnAI(clampedS, lane, type);
      }
    }

    function updateRearAssist() {
      const segments = { left: { dist: Infinity, rel: 0, pressure: false }, center: { dist: Infinity, rel: 0, pressure: false }, right: { dist: Infinity, rel: 0, pressure: false } };
      aiVehicles.forEach(v => {
        const d = player.s - v.s;
        if (d <= 0 || d > 120) return;
        const laneDelta = v.laneIndex - player.laneIndex;
        const key = laneDelta < 0 ? 'left' : laneDelta > 0 ? 'right' : 'center';
        if (d < segments[key].dist) {
          segments[key].dist = d;
          segments[key].rel = v.speed - player.speed;
          segments[key].pressure = v.bullying && key === 'right';
        }
      });
      Object.entries(segments).forEach(([key, seg]) => {
        const el = assistEls[key];
        if (seg.dist === Infinity) {
          el.style.opacity = 0;
          el.style.filter = 'saturate(1) brightness(1)';
          return;
        }
        let alpha = clamp(1 - seg.dist / 95, 0, 1);
        if (seg.rel > 12) alpha = clamp(alpha + 0.2, 0, 1);
        if (seg.pressure) alpha = clamp(alpha + 0.24, 0, 1);
        el.style.opacity = alpha.toFixed(3);
        el.style.filter = `saturate(${seg.pressure ? 1.65 : 1.1}) brightness(${seg.rel > 15 ? 1.12 : 1})`;
      });
    }

    function updateHUD() {
      speedEl.textContent = Math.round(player.speed);
      const laneName = player.laneMode === 'merge' ? '合流車線' : `${player.laneIndex + 1} 車線`;
      laneTextEl.textContent = laneName;
      const s = player.s;
      sectionTextEl.textContent = s < 240 ? '都市高架導入区間' : s < 620 ? '中央道風山間区間' : s < 980 ? '西方面接続区間' : '北九州到達区間';
      destinationTextEl.textContent = player.goal ? `${player.goal.label} / ${player.goal.en}` : '大阪 / 京都 / 名古屋 方面';
      damageTextEl.textContent = Math.round(player.damage);
      damageBarEl.style.width = `${player.damage}%`;
      if (player.goal?.key === 'hakata' && player.s > 900) messageEl.textContent = '右ルートが北九州方面出口です。右側案内を確認してください。';
      if (player.goal?.key === 'nagoya' && player.s > 900) messageEl.textContent = '左ルートが名古屋方面出口です。左車線へ寄ってください。';
    }

    function updateSky() {
      const t = clamp(player.s / 1200, 0, 1);
      const { top, fog } = skyForProgress(t);
      renderer.setClearColor(top);
      scene.fog.color.copy(fog);
      hemi.color.copy(top.clone().multiplyScalar(1.08));
      sun.color.copy(t < 0.7 ? new THREE.Color(0xffffff) : new THREE.Color(0xffd0aa));
      sun.intensity = lerp(1.18, 0.74, t);
    }

    function cameraFollow(dt) {
      const frame = routeFrame(player.s);
      const targetPos = player.mesh.position.clone();
      const back = frame.tangent.clone().multiplyScalar(-7.8 - player.speed * 0.022);
      const rise = new THREE.Vector3(0, 2.35, 0);
      const camPos = targetPos.clone().add(back).add(rise).add(frame.right.clone().multiplyScalar(0.18));
      camera.position.lerp(camPos, 1 - Math.exp(-dt * 6.0));
      const look = targetPos.clone().add(frame.tangent.clone().multiplyScalar(10.5)).add(new THREE.Vector3(0, 0.95, 0));
      camera.lookAt(look);
    }

    function updateCollisions(dt) {
      aiVehicles.forEach(v => {
        const longitudinal = Math.abs(v.s - player.s);
        const lengthOverlap = (player.length + v.length) * 0.52;
        if (longitudinal > lengthOverlap) return;
        const lateral = Math.abs(v.laneOffset - player.laneOffset);
        const widthOverlap = (player.width + v.width) * 0.48;
        if (lateral > widthOverlap || !player.allowInput) return;
        const relSpeed = Math.abs(player.speed - v.speed);
        const impactBase = ((lengthOverlap - longitudinal) / Math.max(0.1, lengthOverlap)) + ((widthOverlap - lateral) / Math.max(0.1, widthOverlap));
        const impact = clamp(impactBase * 6 + relSpeed * 0.06, 0.8, 14);
        addDamage(impact * dt * 1.4);
        player.speed = Math.max(0, player.speed - impact * 0.12);
      });
    }

    function tick(dt) {
      updatePlayer(dt);
      updateAI(dt);
      updateCollisions(dt);
      updateRearAssist();
      updateHUD();
      updateSky();
      positionVehicle({ ...player, isPlayer: true, mesh: player.mesh, width: player.width, length: player.length, s: player.s, laneMode: player.laneMode, laneIndex: player.laneIndex, laneOffset: player.laneOffset, steering: player.steering });
      positionVehicle(player);
      cameraFollow(dt);
      renderer.render(scene, camera);
    }

    let last = performance.now();
    function animate(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      tick(dt);
      requestAnimationFrame(animate);
    }

    positionVehicle(player);
    cameraFollow(1/60);
    updateSky();
    requestAnimationFrame(animate);

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
