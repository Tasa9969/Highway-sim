#goal-screen {

}

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const LANE_W   = 3.5;   // highway standard lane width (m)
const NUM_LN   = 3;
const LS       = 0.75;   // left shoulder
const RS       = 0.75;   // right shoulder
const CB       = 0.6;    // centre barrier half-width
const ROAD_W   = NUM_LN * LANE_W;
const ROAD_LEN = 12000;
const ROAD_END_Z = -ROAD_LEN + 12;
const ROUTE_TOTAL_KM = 344.2;
const ROUTE_POINTS = [
  { name:'高井戸IC', km:0.0 },
  { name:'調布IC', km:7.7 },
  { name:'稲城IC', km:10.0 },
  { name:'国立府中IC', km:16.9 },
  { name:'八王子IC', km:25.8 },
  { name:'相模湖IC', km:45.4 },
  { name:'上野原IC', km:56.1 },
  { name:'大月IC/JCT', km:71.0 },
  { name:'勝沼IC', km:98.8 },
  { name:'一宮御坂IC', km:106.2 },
  { name:'甲府昭和IC', km:120.4 },
  { name:'韮崎IC', km:134.9 },
  { name:'諏訪IC', km:182.3 },
  { name:'岡谷JCT', km:189.0 },
  { name:'伊那IC', km:211.7 },
  { name:'飯田IC', km:255.4 },
  { name:'中津川IC', km:300.2 },
  { name:'恵那IC', km:308.2 },
  { name:'土岐IC/JCT', km:323.4 },
  { name:'多治見IC', km:332.0 },
  { name:'小牧東IC', km:337.8 },
  { name:'小牧JCT/IC', km:344.2 },
];

const LANE_SECTIONS = [
  { start: 40, end: -1450, lanes: 3 },
  { start: -1450, end: -3100, lanes: 2 },
  { start: -3100, end: -5600, lanes: 3 },
  { start: -5600, end: -7600, lanes: 2 },
  { start: -7600, end: -10200, lanes: 3 },
  { start: -10200, end: -11050, lanes: 2 },
  { start: -11050, end: -ROAD_LEN, lanes: 3 },
];
const DASH_ON  = 8;
const DASH_GAP = 12;

// Lane 0=leftmost(slowest), 1=middle, 2=rightmost(overtake)
function laneCountAtZ(z){
  const sec = LANE_SECTIONS.find(s => z <= s.start && z > s.end);
  return sec ? sec.lanes : 3;
}
function getLaneReductionAhead(z, lookahead = 220){
  for(let i=0; i<LANE_SECTIONS.length-1; i++){
    const cur = LANE_SECTIONS[i];
    const next = LANE_SECTIONS[i+1];
    if(cur.lanes > next.lanes && z <= cur.start && z > cur.end){
      const dist = z - cur.end;
      if(dist >= 0 && dist <= lookahead){
        return { dist, startZ: cur.end, from: cur.lanes, to: next.lanes };
      }
    }
  }
  return null;
}
function roadRightEdgeAtZ(z){
  return -(ROAD_W/2) + laneCountAtZ(z) * LANE_W;
}
function closedLaneCenterX(z){
  return laneX(2, z);
}
function laneX(ln, z = 0){
  return -(ROAD_W/2) + LANE_W*ln + LANE_W/2;
}
function laneLabel(ln, z){
  const count = laneCountAtZ(z);
  if(ln < 0) return '合流車線';
  if(count === 2){
    return ln === 0 ? '第1車線（走行）' : '第2車線（追越）';
  }
  return ln===0 ? '第1車線（走行）' : ln===1 ? '第2車線（中央）' : '第3車線（追越）';
}
const MERGE_X  = laneX(0) - LANE_W;   // merge lane centre

function getRouteProgress(z){
  return clamp01(Math.abs(Math.min(0, z)) / Math.abs(ROAD_END_Z));
}
function getRouteKm(z){
  return getRouteProgress(z) * ROUTE_TOTAL_KM;
}
function getRouteSectionLabel(routeKm){
  for(let i=0; i<ROUTE_POINTS.length-1; i++){
    if(routeKm < ROUTE_POINTS[i+1].km){
      return `${ROUTE_POINTS[i].name} → ${ROUTE_POINTS[i+1].name}`;
    }
  }
  return `${ROUTE_POINTS[ROUTE_POINTS.length-2].name} → ${ROUTE_POINTS[ROUTE_POINTS.length-1].name}`;
}

const VDEFS = {
  sedan: {name:'セダン',     L:4.6,  W:1.75,H:1.45,maxSpd:180,acc:7, brk:9, cruise:[95,110], clr:['#cccccc','#111111','#aaaaaa','#223355','#6b0f1a'],ai:{agg:.5,prc:.5,skl:.5}},
  kei:   {name:'軽自動車',   L:3.4,  W:1.48,H:1.65,maxSpd:130,acc:5, brk:8, cruise:[80,95],  clr:['#ffffff','#dddddd','#aaddee','#ffeeaa','#ffccdd'],ai:{agg:.2,prc:.5,skl:.5}},
  sports:{name:'スポーツカー',L:4.4, W:1.82,H:1.25,maxSpd:220,acc:14,brk:12,cruise:[120,145],clr:['#cc0000','#0000cc','#eeee00','#ffffff','#111111','#ff6600'],ai:{agg:.8,prc:.75,skl:.7}},
  truck: {name:'トラック',   L:7.5,  W:2.3, H:3.0, maxSpd:110,acc:4, brk:6, cruise:[75,90],  clr:['#dddddd','#aaaaaa','#223344','#334455'],ai:{agg:.2,prc:.5,skl:.5}},
  dump:  {name:'ダンプ',     L:6.5,  W:2.2, H:2.8, maxSpd:100,acc:4, brk:5, cruise:[70,85],  clr:['#cccccc','#888888','#333366','#6688aa'],ai:{agg:.45,prc:.35,skl:.45}},
  bus:   {name:'バス',       L:10.5, W:2.5, H:3.2, maxSpd:110,acc:4, brk:6, cruise:[80,95],  clr:['#ffffff','#eeeeff','#aaccee','#ccffcc'],ai:{agg:.15,prc:.8,skl:.75}},
  bike:  {name:'バイク',     L:2.1,  W:0.8, H:1.15,maxSpd:200,acc:12,brk:10,cruise:[100,130],clr:['#ffffff','#111111','#cc0000','#0000cc','#ffff00'],ai:{agg:.6,prc:.8,skl:.65}},
};

// ═══════════════════════════════════════════════
// RENDERER / SCENE
// ═══════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(innerWidth,innerHeight);
addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

const scene = new THREE.Scene();
const SKY0 = new THREE.Color(0xb8d4ec);
scene.background = SKY0.clone();
scene.fog = new THREE.FogExp2(0xb8d4ec, 0.0035);

const camera = new THREE.PerspectiveCamera(54, innerWidth/innerHeight, 0.2, 900);

scene.add(new THREE.AmbientLight(0xffffff,0.68));
const sun = new THREE.DirectionalLight(0xfff6e0,1.15);
sun.position.set(55,110,35);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{left:-200,right:200,top:200,bottom:-200,near:1,far:600});
sun.shadow.bias = -0.001;
scene.add(sun);

// ═══════════════════════════════════════════════
// MATERIALS
// ═══════════════════════════════════════════════
const MAT = {
  asphalt: new THREE.MeshLambertMaterial({color:0x495a68}),
  shoulder:new THREE.MeshLambertMaterial({color:0x1e1e1f}),
  white:   new THREE.MeshBasicMaterial({color:0xeeeee0}),
  yellow:  new THREE.MeshBasicMaterial({color:0xf0c020}),
  metal:   new THREE.MeshLambertMaterial({color:0x8a8a8a}),
  concrete:new THREE.MeshLambertMaterial({color:0x9a9a9a}),
  tire:    new THREE.MeshLambertMaterial({color:0x111111}),
  glass:   new THREE.MeshLambertMaterial({color:0x7aaabb,transparent:true,opacity:0.52}),
  ground:  new THREE.MeshLambertMaterial({color:0x3a4830}),
};

// ═══════════════════════════════════════════════
// ROAD BUILDER
// ═══════════════════════════════════════════════
function buildRoad() {
  const HL = ROAD_LEN/2;
  const ZC = -HL;  // z-centre of road stretching from 0 to -ROAD_LEN

  // Helper: flat plane
  const plane = (w,d,x,z,y,mat,rcv) => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w,d), mat);
    m.rotation.x = -Math.PI/2; m.position.set(x,y,z);
    if(rcv) m.receiveShadow=true;
    scene.add(m); return m;
  };

  // Main asphalt
  plane(ROAD_W, ROAD_LEN, 0, ZC, 0, MAT.asphalt, true);
  // Left shoulder
  plane(LS, ROAD_LEN, -(ROAD_W/2+LS/2), ZC, 0.004, MAT.shoulder);
  // Right shoulder
  plane(RS, ROAD_LEN,  (ROAD_W/2+RS/2), ZC, 0.004, MAT.shoulder);

  // Ground beyond
  plane(2000, ROAD_LEN+400, 0, ZC, -0.02, MAT.ground, true);

  // ── Lane markings ──
  solidLine(-(ROAD_W/2), ROAD_LEN, 0.15, 0.011);
  solidVariableRightEdge(0.15, 0.011);
  dashedVariableSeparator(1, 0.15, 0.011);
  dashedVariableSeparator(2, 0.15, 0.011);
  buildLaneClosures();

  // ── Centre barrier (Jersey barrier style) ──
  for(let side=-1; side<=1; side+=2) {
    const bx = side*(ROAD_W/2+LS+CB/2);
    const bg = new THREE.BoxGeometry(0.5,0.9,ROAD_LEN);
    const bm = new THREE.Mesh(bg, MAT.concrete);
    bm.position.set(bx,0.45,ZC); bm.castShadow=true; scene.add(bm);
    // Chamfer top (fake)
    const tg = new THREE.BoxGeometry(0.3,0.18,ROAD_LEN);
    const tm = new THREE.Mesh(tg, new THREE.MeshLambertMaterial({color:0xb0b0b0}));
    tm.position.set(bx,0.89,ZC); scene.add(tm);
  }

  // ── Sound walls (urban section only) ──
  buildSoundWalls(-700, 10);

  // ── Merge lane ──
  buildMergeLane();

  // ── Gantry signs ──
  const signs=[
    {z:-85, t:['合流注意','→ 本線'], r:null},
    {z:-280,t:['中央道 E20','調布・八王子方面'], r:'E20'},
    {z:-900,t:['国立府中IC 6km','八王子IC 15km'], r:'E20'},
    {z:-2200,t:['相模湖IC 20km','大月JCT 46km'], r:'E20'},
    {z:-4200,t:['勝沼IC 16km','甲府昭和IC 38km'], r:'E20'},
    {z:-6500,t:['諏訪IC 20km','岡谷JCT 27km'], r:'E20'},
    {z:-8700,t:['飯田IC 42km','中津川IC 87km'], r:'E20'},
    {z:-10800,t:['土岐IC/JCT 14km','小牧JCT/IC 35km'], r:'E20'},
  ];
  signs.forEach(s => buildGantry(s.z, s.t, s.r));

  // ── Scenery ──
  buildScenery();
}

function solidLine(x, len, w, y) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,len), MAT.white);
  m.rotation.x=-Math.PI/2; m.position.set(x,y,-len/2); scene.add(m);
}
function dashedLine(x, len, on, gap, w, y) {
  const period = on+gap;
  for(let z=0;z<len;z+=period) {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w,on), MAT.white);
    m.rotation.x=-Math.PI/2; m.position.set(x,y,-(z+on/2)); scene.add(m);
  }
}
function solidVariableRightEdge(w, y){
  let segStart = 0;
  let currentX = roadRightEdgeAtZ(0);
  for(let z=-2; z>=-ROAD_LEN; z-=2){
    const x = roadRightEdgeAtZ(z);
    if(Math.abs(x-currentX) > 0.01){
      const len = Math.abs(segStart - z);
      const centerZ = (segStart + z) / 2;
      const m = new THREE.Mesh(new THREE.PlaneGeometry(w, len), MAT.white);
      m.rotation.x = -Math.PI/2; m.position.set(currentX, y, centerZ); scene.add(m);
      segStart = z;
      currentX = x;
    }
  }
  const len = Math.abs(segStart + ROAD_LEN);
  const centerZ = (segStart - ROAD_LEN) / 2;
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, len), MAT.white);
  m.rotation.x = -Math.PI/2; m.position.set(currentX, y, centerZ); scene.add(m);
}
function dashedVariableSeparator(separatorIndex, w, y){
  const period = DASH_ON + DASH_GAP;
  for(let z=0; z>-ROAD_LEN; z-=period){
    const sampleZ = z - DASH_ON/2;
    if(laneCountAtZ(sampleZ) <= separatorIndex) continue;
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, DASH_ON), MAT.white);
    m.rotation.x = -Math.PI/2;
    m.position.set(-(ROAD_W/2)+LANE_W*separatorIndex, y, sampleZ);
    scene.add(m);
  }
}
function buildLaneClosures(){
  const transitionLen = 180;
  const wallInset = 0.28;
  LANE_SECTIONS.filter(sec => sec.lanes === 2).forEach(sec => {
    const zStart = sec.start;
    const zEnd = sec.end;
    const closedLeft = -(ROAD_W/2) + LANE_W * 2;
    const closedRight = ROAD_W/2;
    const liveRight = roadRightEdgeAtZ(zStart);
    const laneCenter = (closedLeft + closedRight) / 2;
    const reducedWallX = liveRight + wallInset + CB/2;

    const taper = new THREE.Shape();
    taper.moveTo(closedLeft, zStart);
    taper.lineTo(closedRight, zStart);
    taper.lineTo(closedRight, zStart - transitionLen);
    taper.lineTo(liveRight, zStart - transitionLen);
    taper.lineTo(closedLeft, zStart);
    const tg = new THREE.ShapeGeometry(taper);
    const tm = new THREE.Mesh(tg, MAT.shoulder);
    tm.rotation.x = -Math.PI/2;
    tm.position.y = 0.008;
    scene.add(tm);

    const len = Math.abs((zStart - transitionLen) - zEnd);
    const fill = new THREE.Mesh(new THREE.PlaneGeometry(closedRight - liveRight, len), MAT.shoulder);
    fill.rotation.x = -Math.PI/2;
    fill.position.set((closedRight + liveRight) / 2, 0.008, ((zStart - transitionLen) + zEnd) / 2);
    scene.add(fill);

    const edgeLen = Math.abs((zStart - transitionLen) - zEnd);
    const edge = new THREE.Mesh(new THREE.PlaneGeometry(0.16, edgeLen), MAT.white);
    edge.rotation.x = -Math.PI/2;
    edge.position.set(liveRight, 0.013, ((zStart - transitionLen) + zEnd) / 2);
    scene.add(edge);

    const gore = new THREE.Mesh(new THREE.PlaneGeometry(0.18, transitionLen * 0.95), MAT.white);
    gore.rotation.x = -Math.PI/2;
    gore.rotation.z = -Math.atan2(closedRight - liveRight, transitionLen);
    gore.position.set((closedRight + liveRight) / 2, 0.013, zStart - transitionLen / 2);
    scene.add(gore);

    for(let z=zStart-16; z>zEnd; z-=18){
      const diag1 = new THREE.Mesh(new THREE.PlaneGeometry(0.24, 3.2), MAT.yellow);
      diag1.rotation.x = -Math.PI/2;
      diag1.rotation.z = Math.PI / 4.5;
      diag1.position.set(laneCenter - 0.45, 0.014, z);
      scene.add(diag1);
      const diag2 = new THREE.Mesh(new THREE.PlaneGeometry(0.24, 3.2), MAT.yellow);
      diag2.rotation.x = -Math.PI/2;
      diag2.rotation.z = -Math.PI / 4.5;
      diag2.position.set(laneCenter + 0.45, 0.014, z);
      scene.add(diag2);
    }

    const wallLen = Math.abs(zEnd - (zStart - transitionLen));
    const wallCenterZ = ((zStart - transitionLen) + zEnd) / 2;
    const wall = new THREE.Mesh(new THREE.BoxGeometry(0.34, 1.05, wallLen), MAT.concrete);
    wall.position.set(reducedWallX, 0.52, wallCenterZ);
    wall.castShadow = true;
    scene.add(wall);
    const wallTop = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.18, wallLen), new THREE.MeshLambertMaterial({color:0xb0b0b0}));
    wallTop.position.set(reducedWallX, 1.0, wallCenterZ);
    scene.add(wallTop);

    buildLaneReductionNotice(zStart, reducedWallX);
    buildLaneReductionArrows(zStart);
  });
}


function drawLaneReductionSymbol(ctx, x, y, scale = 1){
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.strokeStyle = '#111111';
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-38, -26); ctx.lineTo(-38, 28);
  ctx.moveTo(38, -26); ctx.lineTo(10, 4); ctx.lineTo(10, 28);
  ctx.stroke();
  ctx.restore();
}

function buildLaneReductionNotice(zStart, wallX){
  buildLaneReductionVMS(zStart);
  buildLaneReductionGreenSigns(zStart, wallX);
  buildLaneReductionCones(zStart);
  buildLaneReductionArrows(zStart);
}

function buildLaneReductionVMS(zStart){
  [3000, 2000].forEach(dist => {
    const signZ = zStart + dist;
    if(signZ > 20) return;
    const spanW = roadRightEdgeAtZ(signZ) - (-(ROAD_W/2)) + LS + RS + CB * 2 + 3.6;
    const postY = 4.8;
    [-spanW/2, spanW/2].forEach(px => {
      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.14, postY, 10), MAT.metal);
      post.position.set(px, postY / 2, signZ);
      post.castShadow = true;
      scene.add(post);
    });
    const beam = new THREE.Mesh(new THREE.BoxGeometry(spanW, 0.34, 0.34), MAT.metal);
    beam.position.set(0, postY, signZ);
    scene.add(beam);

    const cv = document.createElement('canvas');
    cv.width = 640; cv.height = 128;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#111111';
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.strokeStyle = '#2a2a2a';
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, cv.width - 4, cv.height - 4);
    ctx.fillStyle = '#ffb300';
    ctx.font = 'bold 34px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('この先 右車線規制', cv.width / 2, 46);
    ctx.font = 'bold 38px sans-serif';
    ctx.fillText('LEFT MERGE AHEAD', cv.width / 2, 96);

    const tex = new THREE.CanvasTexture(cv);
    const board = new THREE.Mesh(
      new THREE.PlaneGeometry(Math.min(8.6, spanW * 0.72), 1.72),
      new THREE.MeshBasicMaterial({map: tex, side: THREE.DoubleSide})
    );
    board.position.set(0, postY - 0.55, signZ);
    scene.add(board);
  });
}

function buildLaneReductionGreenSigns(zStart, wallX){
  [1000, 500].forEach(dist => {
    const signZ = zStart + dist;
    if(signZ > 20) return;
    const signX = wallX + 4.8;

    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.12, 4.8, 8), MAT.metal);
    post.position.set(signX, 2.4, signZ);
    post.castShadow = true;
    scene.add(post);

    const cv = document.createElement('canvas');
    cv.width = 520; cv.height = 210;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#0f6a2f';
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 6;
    ctx.strokeRect(3, 3, cv.width - 6, cv.height - 6);

    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 34px sans-serif';
    ctx.fillText('この先 右車線減少', cv.width / 2, 46);
    ctx.font = 'bold 30px sans-serif';
    ctx.fillText(`${dist}m`, cv.width / 2, 88);
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('左車線へお寄りください', cv.width / 2, 194);

    ctx.fillStyle = '#ffd54a';
    ctx.save();
    ctx.translate(92, 122);
    ctx.rotate(Math.PI / 4);
    ctx.fillRect(-34, -34, 68, 68);
    ctx.restore();
    drawLaneReductionSymbol(ctx, 92, 122, 0.9);

    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(210, 132); ctx.lineTo(355, 132);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(210, 132); ctx.lineTo(238, 106);
    ctx.moveTo(210, 132); ctx.lineTo(238, 158);
    ctx.stroke();

    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.MeshBasicMaterial({map: tex, side: THREE.DoubleSide, transparent: true});
    const board = new THREE.Mesh(new THREE.PlaneGeometry(5.8, 2.35), mat);
    board.position.set(signX - 0.04, 4.25, signZ);
    board.rotation.y = -Math.PI / 2;
    scene.add(board);
  });
}

function buildLaneReductionCones(zStart){
  const coneMat = new THREE.MeshLambertMaterial({color: 0xff6a00});
  const stripeMat = new THREE.MeshBasicMaterial({color: 0xffffff});
  [260, 220, 180, 140, 100].forEach((dist, idx) => {
    const z = zStart + dist;
    if(z > 25) return;
    // Keep cones entirely inside the closing right lane.
    const t = idx / 4;
    const x = laneX(2, z) + 0.65 - t * 0.9;
    const cone = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.52, 10), coneMat);
    cone.position.set(x, 0.26, z);
    cone.castShadow = true;
    scene.add(cone);
    const stripe = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.08, 10), stripeMat);
    stripe.position.set(x, 0.22, z);
    scene.add(stripe);
  });

  [210, 130].forEach(dist => {
    const z = zStart + dist;
    if(z > 25) return;
    const x = laneX(2, z) + 0.25;
    const post = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.6, 0.08), MAT.metal);
    post.position.set(x, 0.8, z);
    scene.add(post);

    const cv = document.createElement('canvas');
    cv.width = 128; cv.height = 128;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, 128, 128);
    ctx.strokeStyle = '#ffb300';
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(100, 24); ctx.lineTo(34, 64); ctx.lineTo(100, 104);
    ctx.stroke();

    const tex = new THREE.CanvasTexture(cv);
    const board = new THREE.Mesh(new THREE.PlaneGeometry(0.85, 0.85), new THREE.MeshBasicMaterial({map: tex, side: THREE.DoubleSide}));
    board.position.set(x, 1.35, z);
    board.rotation.y = -Math.PI / 2;
    scene.add(board);
  });
}

function buildLaneReductionArrows(zStart){
  [280, 180, 100].forEach(dist => {
    const z = zStart + dist;
    if(z > 30) return;
    const x = laneX(2, z) - 0.15;
    const shaft = new THREE.Mesh(new THREE.PlaneGeometry(0.34, 3.4), MAT.white);
    shaft.rotation.x = -Math.PI/2;
    shaft.position.set(x, 0.016, z + 0.2);
    scene.add(shaft);

    const head1 = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 0.24), MAT.white);
    head1.rotation.x = -Math.PI/2;
    head1.rotation.z = Math.PI / 5.2;
    head1.position.set(x - 0.48, 0.016, z - 0.8);
    scene.add(head1);

    const head2 = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 0.24), MAT.white);
    head2.rotation.x = -Math.PI/2;
    head2.rotation.z = -Math.PI / 5.2;
    head2.position.set(x - 0.48, 0.016, z - 1.18);
    scene.add(head2);
  });
}

function buildSoundWalls(zStart, zEnd) {
  const wallH = 3.5;
  const wx = ROAD_W/2 + LS + CB + 0.4;
  const panW = 3.9, panD = 0.22;
  const zMin = Math.min(zStart, zEnd);
  const zMax = Math.max(zStart, zEnd);

  [-wx, wx].forEach(bx => {
    const spanLen = zMax - zMin;
    const zCenter = (zMin + zMax) / 2;

    const fg = new THREE.BoxGeometry(0.5, 0.45, spanLen);
    const fm = new THREE.Mesh(fg, MAT.concrete);
    fm.position.set(bx,0.22,zCenter);
    scene.add(fm);

    for(let z=zMax-panW/2; z>zMin; z-=panW+0.08) {
      const isGlass = (Math.floor(Math.abs(z)/16)%4===0);
      const col = isGlass ? 0x8fb8c8 : new THREE.Color().setHSL(0,.0,.66+Math.random()*.08).getHex();
      const pg = new THREE.BoxGeometry(panD,wallH,panW);
      const pm = new THREE.Mesh(pg,
        isGlass
          ? new THREE.MeshLambertMaterial({color:col,transparent:true,opacity:.38})
          : new THREE.MeshLambertMaterial({color:col})
      );
      pm.position.set(bx, wallH/2+0.45, z);
      pm.castShadow=true;
      scene.add(pm);
    }
  });
}

function buildMergeLane() {
  const mLen = 180, mX = MERGE_X;
  const m = new THREE.Mesh(new THREE.PlaneGeometry(LANE_W,mLen), MAT.asphalt);
  m.rotation.x=-Math.PI/2; m.position.set(mX,0.001,-(mLen/2)+25); m.receiveShadow=true; scene.add(m);
  // Left edge
  solidLine(mX-LANE_W/2, mLen, 0.15, 0.012);
  // Right dashed (shared with main lane 0 left edge)
  dashedLine(mX+LANE_W/2, mLen, DASH_ON, DASH_GAP, 0.15, 0.012);
  // Taper arrow
  for(let z=-30;z>-mLen+10;z-=35) {
    const ag = new THREE.Mesh(new THREE.PlaneGeometry(0.7,2.5),MAT.white);
    ag.rotation.x=-Math.PI/2; ag.position.set(mX,0.015,z); scene.add(ag);
  }
  // Guard rail on merge left
  const grg = new THREE.BoxGeometry(0.12,0.55,mLen);
  const grm = new THREE.Mesh(grg,MAT.metal); grm.position.set(mX-LANE_W/2-0.2,0.27,-mLen/2+25); scene.add(grm);
}

function buildGantry(z, lines, routeNum) {
  const spanW = ROAD_W + LS + RS + CB*2 + 5;
  const postH = 6.8, postR = 0.2;
  const beamH = 0.45, beamD = 0.42;
  const signH = 2.4;

  // Posts
  [-spanW/2, spanW/2].forEach(px => {
    const pg = new THREE.CylinderGeometry(postR, postR+0.04, postH, 10);
    const pm = new THREE.Mesh(pg,MAT.metal); pm.position.set(px,postH/2,z); pm.castShadow=true; scene.add(pm);
    // Base flange
    const bf = new THREE.Mesh(new THREE.CylinderGeometry(.55,.55,.12,10), MAT.metal);
    bf.position.set(px,.06,z); scene.add(bf);
  });
  // Beam
  const bm = new THREE.Mesh(new THREE.BoxGeometry(spanW,beamH,beamD), MAT.metal);
  bm.position.set(0,postH,z); scene.add(bm);

  // Sign texture
  const CW=512,CH=130;
  const cv=document.createElement('canvas'); cv.width=CW; cv.height=CH;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#145c22';
  ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=5;
  ctx.strokeRect(3,3,CW-6,CH-6);
  if(routeNum) {
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(14,14,72,38,6); else ctx.rect(14,14,72,38);
    ctx.fill();
    ctx.fillStyle='#145c22';
    ctx.font='bold 22px sans-serif'; ctx.textAlign='center';
    ctx.fillText(routeNum,50,38);
  }
  ctx.fillStyle='#ffffff'; ctx.textAlign='center';
  ctx.font='bold 38px sans-serif';
  ctx.fillText(lines[0],CW/2,CH/2-10);
  ctx.font='26px sans-serif';
  ctx.fillText(lines[1]||'',CW/2,CH/2+32);

  const tex=new THREE.CanvasTexture(cv);
  const sw=spanW*.7;
  const sg=new THREE.Mesh(new THREE.PlaneGeometry(sw,signH), new THREE.MeshBasicMaterial({map:tex,side:THREE.DoubleSide}));
  sg.position.set(0,postH-signH/2-beamH/2-0.05,z); scene.add(sg);
}

function buildScenery() {
  const R=(a,b)=>a+Math.random()*(b-a);
  const wallX = ROAD_W/2+LS+CB+0.7;

  // Trees beyond walls
  for(let i=0;i<500;i++){
    const side=Math.random()>.5?1:-1;
    const xo=R(wallX+2, wallX+60);
    addTree(side*xo, R(-ROAD_LEN,15));
  }
  // Urban buildings (city sections)
  for(let i=0;i<90;i++){
    const side=Math.random()>.5?1:-1;
    const xo=R(wallX+6, wallX+75);
    const z=R(-700,10);
    const h=R(8,55); const w=R(7,20);
    const bm=new THREE.Mesh(new THREE.BoxGeometry(w,h,w*.9),
      new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(R(.55,.65),R(.04,.14),R(.28,.55))}));
    bm.position.set(side*xo,h/2,z); bm.castShadow=true; scene.add(bm);
  }
  for(let i=0;i<55;i++){
    const side=Math.random()>.5?1:-1;
    const xo=R(wallX+6, wallX+65);
    const z=R(-ROAD_LEN,-ROAD_LEN+650);
    const h=R(6,38); const w=R(6,16);
    const bm=new THREE.Mesh(new THREE.BoxGeometry(w,h,w),
      new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(R(.02,.08),R(.04,.12),R(.28,.48))}));
    bm.position.set(side*xo,h/2,z); scene.add(bm);
  }
  // Mountains
  for(let i=0;i<28;i++){
    const side=Math.random()>.5?1:-1;
    const xo=R(90,260); const z=R(-ROAD_LEN,-400);
    const h=R(55,160);
    const cm=new THREE.Mesh(new THREE.ConeGeometry(R(35,80),h,5+Math.floor(Math.random()*3)),
      new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(.3,R(.1,.22),R(.26,.42))}));
    cm.position.set(side*xo,h/2-8,z); cm.rotation.y=Math.random()*Math.PI; scene.add(cm);
  }
  // Sea
  const sm=new THREE.Mesh(new THREE.PlaneGeometry(450,900),
    new THREE.MeshLambertMaterial({color:0x2060a0,transparent:true,opacity:.82}));
  sm.rotation.x=-Math.PI/2; sm.position.set(-230,-0.5,-ROAD_LEN+500); scene.add(sm);
}

function addTree(x,z){
  const h=3.5+Math.random()*7;
  const tm=new THREE.Mesh(new THREE.CylinderGeometry(.13,.2,1.6,5),
    new THREE.MeshLambertMaterial({color:0x5a3a1a}));
  tm.position.set(x,.8,z); scene.add(tm);
  const cm=new THREE.Mesh(new THREE.ConeGeometry(h*.27,h,6+Math.floor(Math.random()*3)),
    new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(.3,.45,.2+Math.random()*.14)}));
  cm.position.set(x,h/2+1.4,z); scene.add(cm);
}

// VEHICLE MESH FACTORY
// ═══════════════════════════════════════════════
function makeVehicle(type, colorHex, bodyOpacity=1) {
  const d = VDEFS[type];
  const g = new THREE.Group();
  const L=d.L, W=d.W, H=d.H;
  const bc = new THREE.Color(colorHex);
  const bodyM = () => new THREE.MeshLambertMaterial({color:bc, transparent:bodyOpacity < 1, opacity:bodyOpacity});
  const darkM = () => new THREE.MeshLambertMaterial({color:new THREE.Color(bc).multiplyScalar(.58), transparent:bodyOpacity < 1, opacity:bodyOpacity});

  const box = (w,h,dz,x,y,z,mat) => {
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,dz),mat);
    m.position.set(x,y,z); m.castShadow=true; g.add(m); return m;
  };

  if(type==='bike'){
    box(W*.42,H*.5,L*.52, 0,H*.5,0, bodyM());
    box(W*.48,H*.58,W*.45, 0,H*.88,0, new THREE.MeshLambertMaterial({color:0x1a1a1a}));
    [[-L*.27],[L*.27]].forEach(([zo])=>{
      const wm=new THREE.Mesh(new THREE.CylinderGeometry(.3,.3,.1,10),MAT.tire);
      wm.rotation.z=Math.PI/2; wm.position.set(0,.3,zo); wm.castShadow=true; g.add(wm);
    });
  } else {
    const bodyH = (type==='truck'||type==='dump') ? H*.42 : H*.52;
    box(W,bodyH,L, 0,bodyH/2+.22,0, bodyM());

    let rW=W*.88,rH,rL,rZ;
    if(type==='sedan')      {rH=H*.36;rL=L*.43;rZ=L*-.04;}
    else if(type==='kei')   {rH=H*.44;rL=L*.56;rZ=0;}
    else if(type==='sports'){rH=H*.26;rL=L*.34;rZ=L*-.04;}
    else if(type==='bus')   {rH=H*.47;rL=L*.87;rZ=0;}
    else                    {rH=H*.44;rL=L*.31;rZ=L*.14;}
    box(rW,rH,rL, 0,bodyH+rH/2+.22,rZ, bodyM());

    // Windshield
    const wm=new THREE.Mesh(new THREE.BoxGeometry(rW*.8,rH*.68,.08),MAT.glass);
    wm.rotation.x=.28; wm.position.set(0,bodyH+rH*.44+.22,rZ-rL/2); wm.castShadow=true; g.add(wm);

    // Truck/dump cargo
    if(type==='truck'||type==='dump'){
      const bH=H*.54,bL=L*.56;
      const bm=box(W*.92,bH,bL, 0,bH/2+.22,-L*.24, darkM());
      if(type==='dump') bm.rotation.x=-.13;
    }
    // Bus windows
    if(type==='bus'){
      const wsm=new THREE.Mesh(new THREE.BoxGeometry(W*.84,rH*.33,rL*.78), bodyOpacity < 1 ? new THREE.MeshLambertMaterial({color:0x7aaabb,transparent:true,opacity:Math.min(0.34, bodyOpacity*0.7)}) : MAT.glass);
      wsm.position.set(0,bodyH+rH*.55+.22,0); g.add(wsm);
    }

    // Brake lights
    const blG=new THREE.BoxGeometry(.24,.15,.07);
    const bls=[-W/2+.10, W/2-.10].map(bx=>{
      const bm=new THREE.Mesh(blG,new THREE.MeshLambertMaterial({color:0xff2020,emissive:0xff0000,emissiveIntensity:0}));
      bm.position.set(bx,bodyH*.58+.22,L/2); g.add(bm); return bm;
    });
    g.userData.brakeLights=bls;

    // Indicators
    const inG=new THREE.BoxGeometry(.17,.12,.07);
    const mkInd=ix=>{
      const mat=new THREE.MeshLambertMaterial({color:0xffaa00,emissive:0xffaa00,emissiveIntensity:0});
      const m=new THREE.Mesh(inG,mat); m.position.set(ix,bodyH*.58+.22,L/2); g.add(m); return m;
    };
    g.userData.indL=mkInd(-W/2+.10);
    g.userData.indR=mkInd( W/2-.10);

    // Wheels
    const wr=.35,wt=.26,wb=L*.57,wtr=W/2+.03;
    [[-wtr,-wb/2],[wtr,-wb/2],[-wtr,wb/2],[wtr,wb/2]].forEach(([wx,wz])=>{
      const wm=new THREE.Mesh(new THREE.CylinderGeometry(wr,wr,wt,12),MAT.tire);
      wm.rotation.z=Math.PI/2; wm.position.set(wx,wr,wz); wm.castShadow=true; g.add(wm);
    });
  }
  g.traverse(c=>{ if(c.isMesh) c.receiveShadow=true; });
  return g;
}

const KEY={accel:false,brake:false,left:false,right:false};
const kmap={x:'accel',z:'brake',arrowleft:'left',a:'left',arrowright:'right',d:'right'};
addEventListener('keydown',e=>{const k=kmap[e.key.toLowerCase()]; if(k){KEY[k]=true; e.preventDefault();}});
addEventListener('keyup',  e=>{const k=kmap[e.key.toLowerCase()]; if(k){KEY[k]=false;}});

// PLAYER
// ═══════════════════════════════════════════════
class Player {
  constructor(type){
    this.type=type;
    this.d=VDEFS[type];
    this.speed=0;   // m/s
    this.yaw=0;     // world yaw (rad) — 0 = forward (-z)
    this.steer=0;   // current effective steering
    this.x=MERGE_X;
    this.z=32;
    this.lane=-1;
    this.merged=false;
    this.blinkT=0;
    const col=0x02a5ad;
    this.mesh=makeVehicle(type,col,0.52);
    this.mesh.position.set(this.x,0,this.z);
    scene.add(this.mesh);
  }
  update(dt){
    const d=this.d;
    const kmh=this.speed*3.6;

    // Throttle / brake
    if(KEY.accel) {
      this.speed += d.acc*dt;
    } else if(KEY.brake) {
      this.speed -= d.brk*dt;
    }
    this.speed = Math.max(0, Math.min(d.maxSpd/3.6, this.speed));

    // Steering
    const sIn = KEY.left ? -1 : KEY.right ? 1 : 0;

    // Speed-adaptive steering: reduce lane-jumpiness at higher speed.
    // Small input changes are filtered through target steer + damping.
    const speedRatio = clamp01(kmh / d.maxSpd);
    const maxS = 0.022 - speedRatio * 0.010;            // 低速でも切れすぎない
    const targetSteer = sIn * maxS;
    const steerResponse = (sIn !== 0 ? 5.2 : 7.4) * dt; // 離したときは素早く戻す
    this.steer += (targetSteer - this.steer) * Math.min(1, steerResponse);

    // Yaw gain also drops with speed to suppress lateral over-travel.
    const yawGain = 0.58 - speedRatio * 0.18;
    this.yaw += this.steer * yawGain;

    // Auto-stability: straighten body heading even while steering lightly.
    const yawReturn = (0.9 + speedRatio * 1.8 + (sIn === 0 ? 1.0 : 0.0)) * dt;
    this.yaw *= Math.max(0, 1 - yawReturn);

    this.steer = Math.max(-maxS, Math.min(maxS, this.steer));
    this.yaw = Math.max(-Math.PI/7, Math.min(Math.PI/7, this.yaw));

    this.x += Math.sin(this.yaw)*this.speed*dt;
    this.z -= Math.cos(this.yaw)*this.speed*dt;

    // Boundary
    const xMin = MERGE_X - LANE_W/2 - LS*.8;
    const xMax = roadRightEdgeAtZ(this.z) + RS * 0.2;
    this.x = Math.max(xMin, Math.min(xMax, this.x));
    this.z = Math.max(-ROAD_LEN + d.L, this.z);

    const activeLaneCount = laneCountAtZ(this.z);
    if(activeLaneCount === 2){
      const closedStartX = roadRightEdgeAtZ(this.z) - 0.18;
      if(this.x > closedStartX){
        this.x += (laneX(1, this.z) - this.x) * Math.min(1, dt * 10.5);
        this.speed *= 0.998;
      }
    }
    if(this.lane >= activeLaneCount){
      this.x += (laneX(activeLaneCount - 1, this.z) - this.x) * Math.min(1, dt * 4.6);
    }

    // Lane detection
    const xl = this.x - (-(ROAD_W/2));
    this.lane = xl<0 ? -1 : Math.min(activeLaneCount-1, Math.floor(xl/LANE_W));

    if(!this.merged && this.lane>=0){
      this.merged=true;
      showMsg('本線に合流しました！',2200);
    }

    // Goal
    if(!goalDone && this.z <= ROAD_END_Z){
      triggerGoal(false, true);
    }

    // Lights
    this.setBrake(KEY.brake);
    this.blinkT+=dt; if(this.blinkT>.5) this.blinkT=0;
    const bon=this.blinkT<.25;
    if(this.mesh.userData.indL) this.mesh.userData.indL.material.emissiveIntensity=(KEY.left &&bon)?1:0;
    if(this.mesh.userData.indR) this.mesh.userData.indR.material.emissiveIntensity=(KEY.right&&bon)?1:0;
    if(this.type==='bike') this.mesh.rotation.z=this.steer*8.5;

    this.mesh.position.set(this.x,0,this.z);
    this.mesh.rotation.y=-this.yaw;
  }
  setBrake(on){
    if(this.mesh.userData.brakeLights)
      this.mesh.userData.brakeLights.forEach(b=>b.material.emissiveIntensity=on?1:0);
  }
}

// ═══════════════════════════════════════════════
// AI VEHICLE
// ═══════════════════════════════════════════════
class AIVeh {
  constructor(type,startZ,ln){
    this.type=type;
    this.d=VDEFS[type];
    const ai=this.d.ai;
    this.agg =clamp01(ai.agg +rand(-.3,.3));
    this.perc=clamp01(ai.prc +rand(-.3,.3));
    this.skl =clamp01(ai.skl +rand(-.3,.3));
    const [lo,hi]=this.d.cruise;
    const base=lo+(hi-lo)*(.3+this.agg*.7);
    const ov=this.agg>.72?rand(10,45):this.agg*22;
    this.tgt=(Math.max(50,base+ov+rand(-8,8)))/3.6;
    this.speed=this.tgt*rand(.7,.95);
    this.lane=ln; this.x=laneX(ln, startZ); this.z=startZ;
    this.tgtX=this.x; this.changing=false;
    this.chTimer=rand(0,3); this.chCD=rand(3,8);
    this.winkerDir=0; this.blinkT=0;
    this.thankT=0; this.active=true;
    const cols=this.d.clr;
    this.mesh=makeVehicle(type,cols[Math.floor(Math.random()*cols.length)],1);
    this.mesh.position.set(this.x,0,this.z);
    scene.add(this.mesh);
  }
  update(dt,player,others){
    if(!this.active) return;
    this.chTimer+=dt; this.blinkT+=dt;
    if(this.blinkT>.5) this.blinkT=0;
    const bon=this.blinkT<.25;

    // Front detection
    const sr=80+this.perc*40;
    let fDist=9999,fSpd=this.tgt;
    others.forEach(o=>{
      if(o===this||!o.active) return;
      if(Math.abs(o.x-this.x)<LANE_W*.7 && o.z<this.z && o.z>this.z-sr){
        const d2=this.z-o.z;
        if(d2<fDist){fDist=d2;fSpd=o.speed;}
      }
    });
    if(player&&Math.abs(player.x-this.x)<LANE_W*.7){
      const d2=this.z-player.z;
      if(d2>0&&d2<fDist){fDist=d2;fSpd=player.speed;}
    }

    // IDM-ish
    const sHW=(6+(1-this.agg)*14+this.d.L)*(1+this.speed*3.6/80);
    let des=this.tgt,brk=false;
    if(fDist<sHW){
      const r=fDist/sHW;
      des=Math.min(des,fSpd+(fSpd*r*.14));
      if(fDist<this.d.L*1.7){des=fSpd*.62;brk=true;}
    }
    const ar=this.d.acc*(.4+this.skl*.6);
    const br=this.d.brk*(.4+this.skl*.6);
    if(this.speed<des-.5) this.speed+=ar*dt;
    else if(this.speed>des+.5) this.speed-=br*dt;
    this.speed=clamp(0,this.d.maxSpd/3.6,this.speed);
    this.setBrake(brk||(this.speed<des-3));

    const reductionAhead = getLaneReductionAhead(this.z, 900);
    if(reductionAhead && this.lane > reductionAhead.to - 1){
      this.lane = reductionAhead.to - 1;
      this.tgtX = laneX(this.lane, this.z);
      this.changing = true;
      this.winkerDir = -1;
    }

    // Lane change
    if(!this.changing&&this.chTimer>this.chCD){
      let nl=this.lane;
      const maxLaneHere = laneCountAtZ(this.z) - 1;
      if(fDist<sHW*1.35&&fSpd<this.tgt*.8&&this.agg>.28&&this.lane<maxLaneHere){
        const pendingReduction = getLaneReductionAhead(this.z, 700);
        if(!(pendingReduction && this.lane + 1 > pendingReduction.to - 1)){
          nl=this.lane+1; this.winkerDir=1;
        }
      }
      if(this.lane>0&&this.agg<.65&&Math.random()<.018){
        nl=this.lane-1; this.winkerDir=-1;
      }
      if(this.lane>0&&(this.type==='truck'||this.type==='kei')&&Math.random()<.025){
        nl=0; this.winkerDir=-1;
      }
      if(nl!==this.lane){
        const tx=laneX(nl, this.z);
        let safe=true;
        others.forEach(o=>{
          if(o===this||!o.active)return;
          if(Math.abs(o.x-tx)<LANE_W*.6&&Math.abs(o.z-this.z)<22)safe=false;
        });
        if(player&&Math.abs(player.x-tx)<LANE_W*.6&&Math.abs(player.z-this.z)<22)safe=false;
        if(safe){this.lane=nl;this.tgtX=tx;this.changing=true;this.chTimer=0;this.chCD=rand(6,12);}
        else this.winkerDir=0;
      }
    }
    if(this.changing){
      this.tgtX = laneX(Math.min(this.lane, laneCountAtZ(this.z)-1), this.z);
      const diff=this.tgtX-this.x;
      this.x+=diff*Math.min(1,dt*(0.225+this.skl*0.1625));
      if(Math.abs(diff)<.08){this.x=this.tgtX;this.changing=false;this.winkerDir=0;}
    }

    if(this.mesh.userData.indL) this.mesh.userData.indL.material.emissiveIntensity=(this.winkerDir===-1&&bon)?1:0;
    if(this.mesh.userData.indR) this.mesh.userData.indR.material.emissiveIntensity=(this.winkerDir===1&&bon)?1:0;
    if(this.thankT>0){
      this.thankT-=dt;
      const h=bon;
      if(this.mesh.userData.indL) this.mesh.userData.indL.material.emissiveIntensity=h?1:0;
      if(this.mesh.userData.indR) this.mesh.userData.indR.material.emissiveIntensity=h?1:0;
    }

    this.z-=this.speed*dt;
    if(laneCountAtZ(this.z) === 2){
      this.lane = Math.min(this.lane, 1);
      const liveRight = roadRightEdgeAtZ(this.z) - LANE_W / 2;
      if(this.x > liveRight - 0.15){
        this.changing = true;
        this.winkerDir = -1;
        this.tgtX = laneX(1, this.z);
        this.x += (this.tgtX - this.x) * Math.min(1, dt * 3.5);
      }
    }
    this.mesh.position.set(this.x,0,this.z);
    this.mesh.rotation.y=(this.x-this.tgtX)*.055;
    if(player && (this.z < player.z - 700 || this.z > player.z + 480)) this.despawn();
    else if(this.z<-ROAD_LEN-60) this.despawn();
  }
  setBrake(on){
    if(this.mesh.userData.brakeLights)
      this.mesh.userData.brakeLights.forEach(b=>b.material.emissiveIntensity=on?.9:0);
  }
  despawn(){
    this.active=false; scene.remove(this.mesh);
    this.mesh.traverse(c=>{if(c.isMesh){c.geometry.dispose();if(c.material.map)c.material.map.dispose();c.material.dispose();}});
  }
}

// ═══════════════════════════════════════════════
// TRAFFIC / COLLISION / STATE
// ═══════════════════════════════════════════════
const AI_LIST=[];
const DENSITY={low:30,mid:66,high:108};
const LOCAL_TRAFFIC_TARGET={low:{ahead:3,behind:2},mid:{ahead:5,behind:3},high:{ahead:7,behind:4}};
const TYPE_W=['sedan','sedan','sedan','kei','kei','sports','truck','truck','dump','bus','bike'];
let spawnT=0;
let damage=0,collisions=0,goalDone=false;
let distTot=0,spdSum=0,spdN=0;

function spawnAI(pl){
  const active = AI_LIST.filter(v=>v.active);
  const nearActive = active.filter(v => v.z > pl.z - 760 && v.z < pl.z + 460);
  if(nearActive.length>=DENSITY[trafficDensity]) return false;

  const cfg = LOCAL_TRAFFIC_TARGET[trafficDensity] || LOCAL_TRAFFIC_TARGET.mid;
  const nearbyAhead = nearActive.filter(v => v.z < pl.z && v.z > pl.z - 360).length;
  const nearbyBehind = nearActive.filter(v => v.z > pl.z && v.z < pl.z + 240).length;
  const aheadShortage = Math.max(0, cfg.ahead - nearbyAhead);
  const behindShortage = Math.max(0, cfg.behind - nearbyBehind);

  let putBehind;
  if(aheadShortage > behindShortage) putBehind = false;
  else if(behindShortage > aheadShortage) putBehind = true;
  else putBehind = Math.random() < 0.42;

  const tries = 20;
  for(let i=0;i<tries;i++){
    const z = putBehind ? pl.z + rand(80, 260) : pl.z - rand(90, 420);
    const laneCount = laneCountAtZ(z);
    const lanePool = laneCount === 2 ? [0,0,1,1,1] : [0,0,1,1,2,2];
    const ln = lanePool[Math.floor(Math.random()*lanePool.length)];
    const lx = laneX(ln, z);

    const blockedByAI = nearActive.some(v => Math.abs(v.z - z) < 26 && Math.abs(v.x - lx) < LANE_W * 0.75);
    const blockedByPlayer = Math.abs(pl.z - z) < 34 && Math.abs(pl.x - lx) < LANE_W * 0.75;
    if(blockedByAI || blockedByPlayer) continue;

    const type=TYPE_W[Math.floor(Math.random()*TYPE_W.length)];
    const ai=new AIVeh(type, z, ln);
    AI_LIST.push(ai);
    return true;
  }
  return false;
}

function checkCollisions(pl){
  if(goalDone) return;
  const pd=VDEFS[pl.type];
  const ph=pd.W/2, phl=pd.L/2;
  AI_LIST.forEach(ai=>{
    if(!ai.active)return;
    if(Math.abs(pl.x-ai.x)<ph+ai.d.W/2-.08&&Math.abs(pl.z-ai.z)<phl+ai.d.L/2-.08){
      const imp=Math.max(0,Math.abs((pl.speed-ai.speed)*3.6/8));
      damage=Math.min(100,damage+imp*2.5);
      collisions++;
      updateDmg();
      if(damage>=100){triggerGoal(true);return;}
      showMsg('接触！',700);
      pl.speed*=.55;
      if(Math.random()<.28) ai.thankT=1.3;
    }
  });
  const xMax=roadRightEdgeAtZ(pl.z)+RS*.8;
  const xMin=MERGE_X-LANE_W/2-LS*.75;
  if(pl.x>xMax||pl.x<xMin){damage=Math.min(100,damage+.7);updateDmg();pl.speed*=.82;if(damage>=100)triggerGoal(true);}
}

function updateDmg(){
  document.getElementById('dmg-fill').style.width=damage+'%';
  document.getElementById('dmg-fill').style.background=damage<40?'#4caf50':damage<70?'#ff9800':'#f44336';
  document.getElementById('dmg-pct').textContent=Math.round(damage)+' %';
}

let msgTO=null;
function showMsg(t,dur=2200){
  const e=document.getElementById('msg'); e.textContent=t; e.style.display='block';
  if(msgTO)clearTimeout(msgTO);
  msgTO=setTimeout(()=>e.style.display='none',dur);
}

function triggerGoal(crashed, exitedCleanly=false){
  goalDone=true;
  const avg=spdN>0?Math.round(spdSum/spdN):0;
  const routeKm = getRouteKm(player ? player.z : ROAD_END_Z);
  const title = crashed
    ? '走行不能'
    : exitedCleanly
      ? `${ROUTE_POINTS[ROUTE_POINTS.length-1].name} 到着！`
      : '区間終点に到達';
  document.getElementById('goal-title').textContent=title;
  document.getElementById('goal-stats').innerHTML=
    `走行距離：${routeKm.toFixed(1)} km<br>`+
    `平均速度：${avg} km/h<br>`+
    `接触回数：${collisions} 回<br>`+
    `ダメージ：${Math.round(damage)} %`;
  document.getElementById('goal-screen').style.display='flex';
}

// ═══════════════════════════════════════════════
// REAR ASSIST HUD
// ═══════════════════════════════════════════════
function updateRearAssist(pl){
  const maxD=65;
  const pln=Math.max(0,pl.lane);
  ['ra-l','ra-c','ra-r'].forEach((id,i)=>{
    const lz=pln-1+i;
    const el=document.getElementById(id);
    const fill=el.querySelector('.ra-fill');
    if(lz<0||lz>=laneCountAtZ(pl.z)){fill.style.width='0%';el.classList.remove('danger','warn');return;}
    const lx=laneX(lz, pl.z);
    let closest=maxD,relSpd=0;
    AI_LIST.forEach(ai=>{
      if(!ai.active)return;
      if(Math.abs(ai.x-lx)<LANE_W*.65&&ai.z>pl.z&&ai.z<pl.z+maxD){
        const d2=ai.z-pl.z;
        if(d2<closest){closest=d2;relSpd=ai.speed-pl.speed;}
      }
    });
    const alpha=1-closest/maxD;
    fill.style.width=(alpha*100)+'%';
    el.classList.toggle('danger',closest<18&&relSpd>6);
    el.classList.toggle('warn',  closest<35&&relSpd>3&&!(closest<18&&relSpd>6));
  });
}

// ═══════════════════════════════════════════════
// SPEEDOMETER
// ═══════════════════════════════════════════════
const SC=document.getElementById('spdcv'), SX=SC.getContext('2d');
function drawSpeedo(kmh){
  SX.clearRect(0,0,220,220);
  const cx=110,cy=110,r=95;
  // Track
  SX.beginPath(); SX.arc(cx,cy,r,Math.PI*.75,Math.PI*2.25);
  SX.strokeStyle='rgba(255,255,255,0.07)'; SX.lineWidth=15; SX.stroke();
  // Fill
  const pct=Math.min(1,kmh/220);
  const col=kmh<100?'#4caf50':kmh<160?'#ff9800':'#f44336';
  SX.beginPath(); SX.arc(cx,cy,r,Math.PI*.75,Math.PI*.75+pct*Math.PI*1.5);
  SX.strokeStyle=col; SX.lineWidth=15; SX.lineCap='round'; SX.stroke();
  // Number
  SX.fillStyle='#fff'; SX.font='bold 40px sans-serif'; SX.textAlign='center';
  SX.fillText(Math.round(kmh),cx,cy+12);
  SX.fillStyle='#666'; SX.font='12px sans-serif';
  SX.fillText('km/h',cx,cy+30);
}

// ═══════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════
let camX=0,camSX=0,camZ=30;
function updateCam(pl){
  const behind=4.2+pl.speed*.02;
  const above=2.0+pl.speed*.004;
  camSX+=(pl.x-camSX)*.11;
  camX+=(camSX-camX)*.15;
  camZ+=(pl.z+behind-camZ)*.2;
  camera.position.set(camX,above,camZ);
  camera.lookAt(pl.x,0.45,pl.z-16);
}

// ═══════════════════════════════════════════════
// SKY
// ═══════════════════════════════════════════════
function updateSky(pl){
  const p=Math.min(1,Math.abs(pl.z)/ROAD_LEN);
  // Cool blue morning → warm afternoon
  const h=.59-p*.12, s=.52+p*.1, l=.74-p*.16;
  const sky=new THREE.Color().setHSL(h,s,l);
  scene.background=sky;
  scene.fog.color=sky;
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(a,b,v)=>Math.max(a,Math.min(b,v));
const clamp01=v=>clamp(0,1,v);

// ═══════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════
let player=null, started=false, lastT=null;
let selectedVehicle='sedan', trafficDensity='mid';
let spawnT2=0;

document.querySelectorAll('[data-v]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-v]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); selectedVehicle=b.dataset.v;
}));
document.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-t]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); trafficDensity=b.dataset.t;
}));

document.getElementById('go-btn').addEventListener('click',()=>{
  document.getElementById('start-screen').style.display='none';
  buildRoad();
  player=new Player(selectedVehicle);
  camX=player.x; camSX=player.x; camZ=player.z+4.2;
  camera.position.set(camX,3.4,camZ);
  document.getElementById('h-vtype').textContent=VDEFS[selectedVehicle].name;
  for(let i=0;i<24;i++) spawnAI(player);
  showMsg('Xキー：アクセル　Zキー：ブレーキ\n本線へ合流してください',4500);
  started=true;
});

function loop(t){
  requestAnimationFrame(loop);
  if(!started||goalDone){renderer.render(scene,camera);return;}
  const dt=lastT?Math.min((t-lastT)/1000,.05):.016;
  lastT=t;

  player.update(dt);
  distTot+=player.speed*dt;
  const kmh=player.speed*3.6;
  spdSum+=kmh; spdN++;

  spawnT2+=dt;
  if(spawnT2>0.45){
    spawnT2=0;
    spawnAI(player);
    if(Math.random()<0.78) spawnAI(player);
    if(Math.random()<0.42) spawnAI(player);
  }

  const active=AI_LIST.filter(v=>v.active);
  active.forEach(ai=>ai.update(dt,player,active));

  checkCollisions(player);
  updateCam(player);
  updateRearAssist(player);
  updateSky(player);

  const routeKm = getRouteKm(player.z);

  // HUD
  drawSpeedo(kmh);
  document.getElementById('h-dist').textContent=routeKm.toFixed(1)+' km';
  document.getElementById('h-seg').textContent=getRouteSectionLabel(routeKm);
  document.getElementById('h-lane').textContent = laneLabel(player.lane, player.z);

  renderer.render(scene,camera);
}
requestAnimationFrame(loop);
</script>
